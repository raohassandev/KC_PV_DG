font:
  - file: "gfonts://Roboto"
    id: font_small
    size: 10

display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    address: 0x3C
    update_interval: 1s
    lambda: |-
      it.printf(0, 0, id(font_small), "PV-DG Controller");
      if (id(ip_addr).has_state() && !id(ip_addr).state.empty()) {
        it.printf(0, 12, id(font_small), "IP: %s", id(ip_addr).state.c_str());
      } else {
        it.print(0, 12, id(font_small), "IP: (no link)");
      }
      if (id(wifi_ssid_sensor).has_state() && !id(wifi_ssid_sensor).state.empty()) {
        it.printf(0, 24, id(font_small), "SSID: %s", id(wifi_ssid_sensor).state.c_str());
      } else {
        it.print(0, 24, id(font_small), "WiFi: connecting...");
      }
      float gkw = isnan(id(grid_total_kw).state) ? 0.0f : id(grid_total_kw).state;
      it.printf(0, 36, id(font_small), "Grid: %.2f kW", gkw);
      float ekwh = isnan(id(grid_import_kwh).state) ? 0.0f : id(grid_import_kwh).state;
      it.printf(0, 48, id(font_small), "E: %.2f kWh", ekwh);