    label: "Grid Meter 1"
    enabled: true
    device_type: "em500"
    role: "grid_meter"
    transport: "rtu"
    modbus_id: 1
    tcp_host: null
    tcp_port: 502
    capacity_kw: 1000
    network_id: "main"
    bus_side: "A"
    generator_type: null
