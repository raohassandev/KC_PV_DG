derived_zones:
  - id: "site"
    summary: "Single zone: 1 grid meter(s), 2 generator meter(s), 1 inverter group(s)"
    active_source_policy: "zero_export"
    fallback_mode: "reduce_to_safe_min"

validation:
  warnings:
    - "Multiple generators are configured without override approval"
  topology_type: "SINGLE_BUS"
  tie_signal_present: false
  generator_override_enabled: false
  network_count: 1
  dual_bus_state: "single"

