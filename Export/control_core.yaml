sensor:
  - platform: template
    id: pv_command_percent_sensor
    name: "PV Command Percent"
    unit_of_measurement: "%"
    accuracy_decimals: 1
    lambda: "return id(pv_cmd_percent_internal);"
    web_server:
      sorting_group_id: grp_overview
      sorting_weight: 11

  - platform: template
    id: pv_command_kw_sensor
    name: "PV Command kW"
    unit_of_measurement: "kW"
    accuracy_decimals: 2
    lambda: "return id(pv_cmd_kw_internal);"
    web_server:
      sorting_group_id: grp_overview
      sorting_weight: 12

  - platform: template
    id: control_error_sensor
    name: "Control Error"
    unit_of_measurement: "kW"
    accuracy_decimals: 2
    lambda: "return id(control_error_kw);"
    web_server:
      sorting_group_id: grp_overview
      sorting_weight: 13

interval:
  - interval: 1s
    then:
      - lambda: |-
          if (!id(enable_grid_meter).state) return;
          if (!isnan(id(grid_total_kw).state)) {
            id(filtered_grid_kw) = 0.7f * id(filtered_grid_kw) + 0.3f * id(grid_total_kw).state;
          }

  - interval: 1s
    then:
      - lambda: |-
          if (!id(controller_enable).state || !id(enable_grid_meter).state) {
            id(control_error_kw) = 0.0f;
            id(pv_cmd_kw_internal) = 0.0f;
            id(pv_cmd_percent_internal) = 0.0f;
            return;
          }

          if (isnan(id(grid_total_kw).state)) return;

          float measure_kw = id(filtered_grid_kw);
          float target_kw = 0.0f;

          if (id(control_mode).state == "grid_zero_export") {
            target_kw = 0.0f;
          } else if (id(control_mode).state == "grid_limited_export") {
            target_kw = -1.0f * id(export_limit_kw).state;
          } else if (id(control_mode).state == "grid_limited_import") {
            target_kw = id(import_limit_kw).state;
          } else {
            id(control_error_kw) = 0.0f;
            id(pv_cmd_kw_internal) = 0.0f;
            id(pv_cmd_percent_internal) = 0.0f;
            return;
          }

          float error_kw = target_kw - measure_kw;
          id(control_error_kw) = error_kw;

          float pv_pct = id(pv_cmd_percent_internal);

          if (fabsf(error_kw) >= id(deadband_kw).state) {
            float delta_pct = (error_kw / fmaxf(id(pv_rated_kw).state, 1.0f)) * 100.0f * id(control_gain).state;
            if (delta_pct > id(ramp_pct_step).state) delta_pct = id(ramp_pct_step).state;
            if (delta_pct < -id(ramp_pct_step).state) delta_pct = -id(ramp_pct_step).state;
            pv_pct += delta_pct;
          }

          if (pv_pct < id(min_pv_percent).state) pv_pct = id(min_pv_percent).state;
          if (pv_pct > id(max_pv_percent).state) pv_pct = id(max_pv_percent).state;

          id(pv_cmd_percent_internal) = pv_pct;
          id(pv_cmd_kw_internal) = (pv_pct / 100.0f) * id(pv_rated_kw).state;

  - interval: 15s
    then:
      - lambda: |-
          ESP_LOGI(
            "SYS",
            "IP=%s | SSID=%s | BSSID=%s | MAC=%s | Grid=%.2f kW | PV=%.2f kW | Cmd=%.2f kW | F=%.3f Hz | PF=%.4f | Eimp=%.2f kWh",
            id(ip_addr).has_state() ? id(ip_addr).state.c_str() : "NA",
            id(wifi_ssid_sensor).has_state() ? id(wifi_ssid_sensor).state.c_str() : "NA",
            id(wifi_bssid_sensor).has_state() ? id(wifi_bssid_sensor).state.c_str() : "NA",
            id(wifi_mac_sensor).has_state() ? id(wifi_mac_sensor).state.c_str() : "NA",
            isnan(id(grid_total_kw).state) ? 0.0f : id(grid_total_kw).state,
            isnan(id(inverter_actual_kw).state) ? 0.0f : id(inverter_actual_kw).state,
            id(pv_cmd_kw_internal),
            isnan(id(grid_frequency).state) ? 0.0f : id(grid_frequency).state,
            isnan(id(grid_total_pf).state) ? 0.0f : id(grid_total_pf).state,
            isnan(id(grid_import_kwh).state) ? 0.0f : id(grid_import_kwh).state
          );