esphome:
  name: pv-dg-controller
  friendly_name: PV DG Controller

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:
  level: DEBUG
  initial_level: INFO
  baud_rate: 115200

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "PV-DG Fallback"
    password: !secret fallback_ap_password

captive_portal:

web_server:
  port: 80
  version: 3
  sorting_groups:
    - id: grp_overview
      name: "Overview"
      sorting_weight: 10
    - id: grp_control
      name: "Control"
      sorting_weight: 20
    - id: grp_grid
      name: "Grid Meter"
      sorting_weight: 30
    - id: grp_inverter
      name: "Huawei Inverter"
      sorting_weight: 40
    - id: grp_energy
      name: "Energy"
      sorting_weight: 50
    - id: grp_io
      name: "I/O"
      sorting_weight: 60
    - id: grp_debug
      name: "Debug"
      sorting_weight: 70

i2c:
  id: bus_a
  sda: GPIO4
  scl:
    number: GPIO15
    ignore_strapping_warning: true
  scan: true

pcf8574:
  - id: pcf_out
    address: 0x24
  - id: pcf_in
    address: 0x22

uart:
  - id: rs485
    tx_pin: GPIO27
    rx_pin: GPIO14
    baud_rate: 9600
    data_bits: 8
    parity: NONE
    stop_bits: 1

modbus:
  - id: plant_bus
    uart_id: rs485
    send_wait_time: 300ms

globals:
  - id: pv_cmd_percent_internal
    type: float
    restore_value: yes
    initial_value: "0.0"

  - id: pv_cmd_kw_internal
    type: float
    restore_value: no
    initial_value: "0.0"

  - id: control_error_kw
    type: float
    restore_value: no
    initial_value: "0.0"

  - id: filtered_grid_kw
    type: float
    restore_value: no
    initial_value: "0.0"

  - id: grid_seen
    type: bool
    restore_value: no
    initial_value: "false"

  - id: inverter_seen
    type: bool
    restore_value: no
    initial_value: "false"

modbus_controller:
  - id: grid_meter
    modbus_id: plant_bus
    address: 1
    setup_priority: -10
    update_interval: 3s
    command_throttle: 150ms
    offline_skip_updates: 3

  - id: solar_inverter
    modbus_id: plant_bus
    address: 10
    setup_priority: -10
    update_interval: 4s
    command_throttle: 250ms
    offline_skip_updates: 3

switch:
  - platform: template
    id: controller_enable
    name: "Controller Enable"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    web_server:
      sorting_group_id: grp_control
      sorting_weight: 1

  - platform: template
    id: inverter_write_enable
    name: "Write Commands To Inverter"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    web_server:
      sorting_group_id: grp_control
      sorting_weight: 2

  - platform: gpio
    id: relay_1
    name: "Relay 1"
    pin:
      pcf8574: pcf_out
      number: 0
      mode: OUTPUT
      inverted: true
    web_server:
      sorting_group_id: grp_io
      sorting_weight: 10

  - platform: gpio
    id: relay_2
    name: "Relay 2"
    pin:
      pcf8574: pcf_out
      number: 1
      mode: OUTPUT
      inverted: true
    web_server:
      sorting_group_id: grp_io
      sorting_weight: 11

  - platform: gpio
    id: relay_3
    name: "Relay 3"
    pin:
      pcf8574: pcf_out
      number: 2
      mode: OUTPUT
      inverted: true
    web_server:
      sorting_group_id: grp_io
      sorting_weight: 12

  - platform: gpio
    id: relay_4
    name: "Relay 4"
    pin:
      pcf8574: pcf_out
      number: 3
      mode: OUTPUT
      inverted: true
    web_server:
      sorting_group_id: grp_io
      sorting_weight: 13

  - platform: gpio
    id: relay_5
    name: "Relay 5"
    pin:
      pcf8574: pcf_out
      number: 4
      mode: OUTPUT
      inverted: true
    web_server:
      sorting_group_id: grp_io
      sorting_weight: 14

  - platform: gpio
    id: relay_6
    name: "Relay 6"
    pin:
      pcf8574: pcf_out
      number: 5
      mode: OUTPUT
      inverted: true
    web_server:
      sorting_group_id: grp_io
      sorting_weight: 15

binary_sensor:
  - platform: status
    name: "ESP Online"
    web_server:
      sorting_group_id: grp_debug
      sorting_weight: 1

  - platform: gpio
    name: "Input 1"
    pin:
      pcf8574: pcf_in
      number: 0
      mode: INPUT
      inverted: true
    web_server:
      sorting_group_id: grp_io
      sorting_weight: 20

  - platform: gpio
    name: "Input 2"
    pin:
      pcf8574: pcf_in
      number: 1
      mode: INPUT
      inverted: true
    web_server:
      sorting_group_id: grp_io
      sorting_weight: 21

  - platform: gpio
    name: "Input 3"
    pin:
      pcf8574: pcf_in
      number: 2
      mode: INPUT
      inverted: true
    web_server:
      sorting_group_id: grp_io
      sorting_weight: 22

  - platform: gpio
    name: "Input 4"
    pin:
      pcf8574: pcf_in
      number: 3
      mode: INPUT
      inverted: true
    web_server:
      sorting_group_id: grp_io
      sorting_weight: 23

  - platform: gpio
    name: "Input 5"
    pin:
      pcf8574: pcf_in
      number: 4
      mode: INPUT
      inverted: true
    web_server:
      sorting_group_id: grp_io
      sorting_weight: 24

  - platform: gpio
    name: "Input 6"
    pin:
      pcf8574: pcf_in
      number: 5
      mode: INPUT
      inverted: true
    web_server:
      sorting_group_id: grp_io
      sorting_weight: 25

select:
  - platform: template
    id: control_mode
    name: "Control Mode"
    optimistic: true
    restore_value: true
    options:
      - "disabled"
      - "grid_zero_export"
      - "grid_limited_export"
      - "grid_limited_import"
    initial_option: "disabled"
    web_server:
      sorting_group_id: grp_control
      sorting_weight: 3

number:
  - platform: template
    id: pv_rated_kw
    name: "PV Rated kW"
    min_value: 1
    max_value: 5000
    step: 1
    optimistic: true
    restore_value: true
    initial_value: 100
    web_server:
      sorting_group_id: grp_control
      sorting_weight: 10

  - platform: template
    id: deadband_kw
    name: "Deadband kW"
    min_value: 0
    max_value: 50
    step: 0.1
    optimistic: true
    restore_value: true
    initial_value: 1.0
    web_server:
      sorting_group_id: grp_control
      sorting_weight: 11

  - platform: template
    id: control_gain
    name: "Control Gain"
    min_value: 0.01
    max_value: 2.0
    step: 0.01
    optimistic: true
    restore_value: true
    initial_value: 0.20
    web_server:
      sorting_group_id: grp_control
      sorting_weight: 12

  - platform: template
    id: export_limit_kw
    name: "Export Limit kW"
    min_value: 0
    max_value: 5000
    step: 0.1
    optimistic: true
    restore_value: true
    initial_value: 0.0
    web_server:
      sorting_group_id: grp_control
      sorting_weight: 13

  - platform: template
    id: import_limit_kw
    name: "Import Limit kW"
    min_value: 0
    max_value: 5000
    step: 0.1
    optimistic: true
    restore_value: true
    initial_value: 0.0
    web_server:
      sorting_group_id: grp_control
      sorting_weight: 14

  - platform: template
    id: min_pv_percent
    name: "Min PV Percent"
    min_value: 0
    max_value: 100
    step: 1
    optimistic: true
    restore_value: true
    initial_value: 0
    web_server:
      sorting_group_id: grp_control
      sorting_weight: 15

  - platform: template
    id: max_pv_percent
    name: "Max PV Percent"
    min_value: 0
    max_value: 100
    step: 1
    optimistic: true
    restore_value: true
    initial_value: 100
    web_server:
      sorting_group_id: grp_control
      sorting_weight: 16

  - platform: template
    id: ramp_pct_step
    name: "Ramp pct Step"
    min_value: 0.1
    max_value: 20
    step: 0.1
    optimistic: true
    restore_value: true
    initial_value: 3.0
    web_server:
      sorting_group_id: grp_control
      sorting_weight: 17

  # hidden write target to Huawei 40120
  - platform: modbus_controller
    id: inverter_command_kw_write
    name: "Inverter Command kW"
    modbus_controller_id: solar_inverter
    address: 40120
    value_type: U_WORD
    min_value: 0
    max_value: 5000
    step: 0.1
    multiply: 10
    use_write_multiple: false
    entity_category: config
    web_server:
      sorting_group_id: grp_inverter
      sorting_weight: 50

sensor:
  # ---------------- EM500 live block ----------------
  - platform: modbus_controller
    modbus_controller_id: grid_meter
    id: grid_l1_voltage
    name: "Grid L1 Voltage"
    register_type: read
    address: 0x0002
    value_type: U_DWORD
    unit_of_measurement: "V"
    accuracy_decimals: 2
    device_class: voltage
    state_class: measurement
    filters:
      - multiply: 0.01
    on_value:
      - lambda: |-
          id(grid_seen) = true;
    web_server:
      sorting_group_id: grp_grid
      sorting_weight: 10

  - platform: modbus_controller
    modbus_controller_id: grid_meter
    id: grid_l2_voltage
    name: "Grid L2 Voltage"
    register_type: read
    address: 0x0004
    value_type: U_DWORD
    unit_of_measurement: "V"
    accuracy_decimals: 2
    device_class: voltage
    state_class: measurement
    filters:
      - multiply: 0.01
    web_server:
      sorting_group_id: grp_grid
      sorting_weight: 11

  - platform: modbus_controller
    modbus_controller_id: grid_meter
    id: grid_l3_voltage
    name: "Grid L3 Voltage"
    register_type: read
    address: 0x0006
    value_type: U_DWORD
    unit_of_measurement: "V"
    accuracy_decimals: 2
    device_class: voltage
    state_class: measurement
    filters:
      - multiply: 0.01
    web_server:
      sorting_group_id: grp_grid
      sorting_weight: 12

  - platform: modbus_controller
    modbus_controller_id: grid_meter
    id: grid_l1_current
    name: "Grid L1 Current"
    register_type: read
    address: 0x0008
    value_type: U_DWORD
    unit_of_measurement: "A"
    accuracy_decimals: 4
    device_class: current
    state_class: measurement
    filters:
      - multiply: 0.0001
    web_server:
      sorting_group_id: grp_grid
      sorting_weight: 13

  - platform: modbus_controller
    modbus_controller_id: grid_meter
    id: grid_l2_current
    name: "Grid L2 Current"
    register_type: read
    address: 0x000A
    value_type: U_DWORD
    unit_of_measurement: "A"
    accuracy_decimals: 4
    device_class: current
    state_class: measurement
    filters:
      - multiply: 0.0001
    web_server:
      sorting_group_id: grp_grid
      sorting_weight: 14

  - platform: modbus_controller
    modbus_controller_id: grid_meter
    id: grid_l3_current
    name: "Grid L3 Current"
    register_type: read
    address: 0x000C
    value_type: U_DWORD
    unit_of_measurement: "A"
    accuracy_decimals: 4
    device_class: current
    state_class: measurement
    filters:
      - multiply: 0.0001
    web_server:
      sorting_group_id: grp_grid
      sorting_weight: 15

  - platform: modbus_controller
    modbus_controller_id: grid_meter
    id: grid_l1_power
    name: "Grid L1 Active Power"
    register_type: read
    address: 0x0014
    value_type: S_DWORD
    unit_of_measurement: "W"
    accuracy_decimals: 2
    device_class: power
    state_class: measurement
    filters:
      - multiply: 0.01
    web_server:
      sorting_group_id: grp_grid
      sorting_weight: 20

  - platform: modbus_controller
    modbus_controller_id: grid_meter
    id: grid_l2_power
    name: "Grid L2 Active Power"
    register_type: read
    address: 0x0016
    value_type: S_DWORD
    unit_of_measurement: "W"
    accuracy_decimals: 2
    device_class: power
    state_class: measurement
    filters:
      - multiply: 0.01
    web_server:
      sorting_group_id: grp_grid
      sorting_weight: 21

  - platform: modbus_controller
    modbus_controller_id: grid_meter
    id: grid_l3_power
    name: "Grid L3 Active Power"
    register_type: read
    address: 0x0018
    value_type: S_DWORD
    unit_of_measurement: "W"
    accuracy_decimals: 2
    device_class: power
    state_class: measurement
    filters:
      - multiply: 0.01
    web_server:
      sorting_group_id: grp_grid
      sorting_weight: 22

  - platform: modbus_controller
    modbus_controller_id: grid_meter
    id: grid_l1_pf
    name: "Grid L1 Power Factor"
    register_type: read
    address: 0x0026
    value_type: S_DWORD
    accuracy_decimals: 4
    state_class: measurement
    filters:
      - multiply: 0.0001
    web_server:
      sorting_group_id: grp_grid
      sorting_weight: 23

  - platform: modbus_controller
    modbus_controller_id: grid_meter
    id: grid_l2_pf
    name: "Grid L2 Power Factor"
    register_type: read
    address: 0x0028
    value_type: S_DWORD
    accuracy_decimals: 4
    state_class: measurement
    filters:
      - multiply: 0.0001
    web_server:
      sorting_group_id: grp_grid
      sorting_weight: 24

  - platform: modbus_controller
    modbus_controller_id: grid_meter
    id: grid_l3_pf
    name: "Grid L3 Power Factor"
    register_type: read
    address: 0x002A
    value_type: S_DWORD
    accuracy_decimals: 4
    state_class: measurement
    filters:
      - multiply: 0.0001
    web_server:
      sorting_group_id: grp_grid
      sorting_weight: 25

  - platform: modbus_controller
    modbus_controller_id: grid_meter
    id: grid_frequency
    name: "Grid Frequency"
    register_type: read
    address: 0x0032
    value_type: U_DWORD
    unit_of_measurement: "Hz"
    accuracy_decimals: 3
    device_class: frequency
    state_class: measurement
    filters:
      - multiply: 0.001
    web_server:
      sorting_group_id: grp_grid
      sorting_weight: 26

  - platform: modbus_controller
    modbus_controller_id: grid_meter
    id: grid_eqv_current
    name: "Grid Eqv Current"
    register_type: read
    address: 0x0038
    value_type: U_DWORD
    unit_of_measurement: "A"
    accuracy_decimals: 4
    device_class: current
    state_class: measurement
    filters:
      - multiply: 0.0001
    web_server:
      sorting_group_id: grp_grid
      sorting_weight: 27

  - platform: modbus_controller
    modbus_controller_id: grid_meter
    id: grid_total_power_w
    name: "Grid Total Active Power"
    register_type: read
    address: 0x003A
    value_type: S_DWORD
    unit_of_measurement: "W"
    accuracy_decimals: 2
    device_class: power
    state_class: measurement
    filters:
      - multiply: 0.01
    web_server:
      sorting_group_id: grp_grid
      sorting_weight: 28

  - platform: modbus_controller
    modbus_controller_id: grid_meter
    id: grid_total_reactive_var
    name: "Grid Total Reactive Power"
    register_type: read
    address: 0x003C
    value_type: S_DWORD
    unit_of_measurement: "var"
    accuracy_decimals: 2
    state_class: measurement
    filters:
      - multiply: 0.01
    web_server:
      sorting_group_id: grp_grid
      sorting_weight: 29

  - platform: modbus_controller
    modbus_controller_id: grid_meter
    id: grid_total_apparent_va
    name: "Grid Total Apparent Power"
    register_type: read
    address: 0x003E
    value_type: U_DWORD
    unit_of_measurement: "VA"
    accuracy_decimals: 2
    state_class: measurement
    filters:
      - multiply: 0.01
    web_server:
      sorting_group_id: grp_grid
      sorting_weight: 30

  - platform: modbus_controller
    modbus_controller_id: grid_meter
    id: grid_total_pf
    name: "Grid Total Power Factor"
    register_type: read
    address: 0x0040
    value_type: S_DWORD
    accuracy_decimals: 4
    state_class: measurement
    filters:
      - multiply: 0.0001
    web_server:
      sorting_group_id: grp_grid
      sorting_weight: 31

  - platform: modbus_controller
    modbus_controller_id: grid_meter
    id: grid_import_kwh
    name: "Grid Import Energy"
    register_type: holding
    address: 0x1B21
    value_type: U_QWORD
    force_new_range: true
    unit_of_measurement: "kWh"
    accuracy_decimals: 2
    state_class: total_increasing
    filters:
      - lambda: |-
          return x / 4294967296.0f;
      - multiply: 0.01
    web_server:
      sorting_group_id: grp_energy
      sorting_weight: 10

  # ---------------- Huawei inverter: essential only ----------------
  - platform: modbus_controller
    modbus_controller_id: solar_inverter
    id: inverter_pmax_kw
    name: "Inverter Pmax"
    register_type: read
    address: 30083
    value_type: U_DWORD
    unit_of_measurement: "kW"
    accuracy_decimals: 3
    filters:
      - multiply: 0.001
    on_value:
      - lambda: |-
          id(inverter_seen) = true;
    web_server:
      sorting_group_id: grp_inverter
      sorting_weight: 10

  - platform: modbus_controller
    modbus_controller_id: solar_inverter
    id: inverter_actual_kw
    name: "Inverter Actual Power"
    register_type: read
    address: 32080
    value_type: S_DWORD
    unit_of_measurement: "kW"
    accuracy_decimals: 3
    filters:
      - multiply: 0.001
    web_server:
      sorting_group_id: grp_inverter
      sorting_weight: 11

  # ---------------- Derived / overview ----------------
  - platform: template
    id: grid_total_kw
    name: "Grid Total kW"
    unit_of_measurement: "kW"
    accuracy_decimals: 2
    lambda: |-
      if (isnan(id(grid_total_power_w).state)) return NAN;
      return id(grid_total_power_w).state / 1000.0f;
    web_server:
      sorting_group_id: grp_overview
      sorting_weight: 10

  - platform: template
    id: pv_command_percent_sensor
    name: "PV Command Percent"
    unit_of_measurement: "%"
    accuracy_decimals: 1
    lambda: |-
      return id(pv_cmd_percent_internal);
    web_server:
      sorting_group_id: grp_overview
      sorting_weight: 11

  - platform: template
    id: pv_command_kw_sensor
    name: "PV Command kW"
    unit_of_measurement: "kW"
    accuracy_decimals: 2
    lambda: |-
      return id(pv_cmd_kw_internal);
    web_server:
      sorting_group_id: grp_overview
      sorting_weight: 12

  - platform: template
    id: control_error_sensor
    name: "Control Error"
    unit_of_measurement: "kW"
    accuracy_decimals: 2
    lambda: |-
      return id(control_error_kw);
    web_server:
      sorting_group_id: grp_overview
      sorting_weight: 13

  - platform: template
    id: site_load_kw
    name: "Site Load"
    unit_of_measurement: "kW"
    accuracy_decimals: 2
    lambda: |-
      if (isnan(id(grid_total_kw).state) || isnan(id(inverter_actual_kw).state)) return NAN;
      return id(grid_total_kw).state + id(inverter_actual_kw).state;
    web_server:
      sorting_group_id: grp_overview
      sorting_weight: 14

text_sensor:
  - platform: template
    id: controller_state
    name: "Controller State"
    lambda: |-
      if (!id(controller_enable).state) return {"DISABLED"};
      if (id(control_mode).state == "grid_zero_export") return {"GRID ZERO EXPORT"};
      if (id(control_mode).state == "grid_limited_export") return {"GRID LIMITED EXPORT"};
      if (id(control_mode).state == "grid_limited_import") return {"GRID LIMITED IMPORT"};
      return {"DISABLED"};
    update_interval: 2s
    web_server:
      sorting_group_id: grp_control
      sorting_weight: 4

  - platform: template
    id: grid_status
    name: "Grid Meter Status"
    lambda: |-
      return { id(grid_seen) ? "ONLINE" : "NO DATA" };
    update_interval: 5s
    web_server:
      sorting_group_id: grp_grid
      sorting_weight: 1

  - platform: template
    id: inverter_status
    name: "Inverter Status"
    lambda: |-
      return { id(inverter_seen) ? "ONLINE" : "NO DATA" };
    update_interval: 5s
    web_server:
      sorting_group_id: grp_inverter
      sorting_weight: 1

button:
  - platform: restart
    name: "Restart Controller"
    web_server:
      sorting_group_id: grp_debug
      sorting_weight: 10

  - platform: template
    name: "Debug INFO"
    web_server:
      sorting_group_id: grp_debug
      sorting_weight: 11
    on_press:
      - logger.set_level: INFO

  - platform: template
    name: "Debug DEBUG"
    web_server:
      sorting_group_id: grp_debug
      sorting_weight: 12
    on_press:
      - logger.set_level: DEBUG

  - platform: template
    name: "Debug WARN"
    web_server:
      sorting_group_id: grp_debug
      sorting_weight: 13
    on_press:
      - logger.set_level: WARN

interval:
  - interval: 1s
    then:
      - lambda: |-
          if (!isnan(id(grid_total_kw).state)) {
            id(filtered_grid_kw) = 0.7f * id(filtered_grid_kw) + 0.3f * id(grid_total_kw).state;
          }

  - interval: 1s
    then:
      - lambda: |-
          if (!id(controller_enable).state) {
            id(control_error_kw) = 0.0f;
            id(pv_cmd_kw_internal) = 0.0f;
            id(pv_cmd_percent_internal) = 0.0f;
            return;
          }

          if (isnan(id(grid_total_kw).state)) {
            return;
          }

          float measure_kw = id(filtered_grid_kw);
          float target_kw = 0.0f;

          if (id(control_mode).state == "grid_zero_export") {
            target_kw = 0.0f;
          } else if (id(control_mode).state == "grid_limited_export") {
            target_kw = -1.0f * id(export_limit_kw).state;
          } else if (id(control_mode).state == "grid_limited_import") {
            target_kw = id(import_limit_kw).state;
          } else {
            id(control_error_kw) = 0.0f;
            id(pv_cmd_kw_internal) = 0.0f;
            id(pv_cmd_percent_internal) = 0.0f;
            return;
          }

          float error_kw = target_kw - measure_kw;
          id(control_error_kw) = error_kw;

          float pv_pct = id(pv_cmd_percent_internal);

          if (fabsf(error_kw) >= id(deadband_kw).state) {
            float delta_pct = (error_kw / fmaxf(id(pv_rated_kw).state, 1.0f)) * 100.0f * id(control_gain).state;
            if (delta_pct > id(ramp_pct_step).state) delta_pct = id(ramp_pct_step).state;
            if (delta_pct < -id(ramp_pct_step).state) delta_pct = -id(ramp_pct_step).state;
            pv_pct += delta_pct;
          }

          if (pv_pct < id(min_pv_percent).state) pv_pct = id(min_pv_percent).state;
          if (pv_pct > id(max_pv_percent).state) pv_pct = id(max_pv_percent).state;

          id(pv_cmd_percent_internal) = pv_pct;
          id(pv_cmd_kw_internal) = (pv_pct / 100.0f) * id(pv_rated_kw).state;

      - if:
          condition:
            switch.is_on: inverter_write_enable
          then:
            - number.set:
                id: inverter_command_kw_write
                value: !lambda "return id(pv_cmd_kw_internal);"

  - interval: 15s
    then:
      - logger.log:
          level: INFO
          format: "Grid=%.2fkW PV=%.2fkW Cmd=%.2fkW F=%.3fHz PF=%.4f Eimp=%.2fkWh"
          args:
            - "id(grid_total_kw).state"
            - "id(inverter_actual_kw).state"
            - "id(pv_cmd_kw_internal)"
            - "id(grid_frequency).state"
            - "id(grid_total_pf).state"
            - "id(grid_import_kwh).state"