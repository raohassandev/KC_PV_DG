esphome:
  name: em500-test
  friendly_name: em500-test

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:
  level: DEBUG
  baud_rate: 115200

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "EM500-Test Fallback"
    password: !secret fallback_ap_password

captive_portal:

web_server:
  port: 80

uart:
  id: rs485
  tx_pin: GPIO27
  rx_pin: GPIO14
  baud_rate: 9600
  data_bits: 8
  parity: NONE
  stop_bits: 1

modbus:
  id: em500_bus
  uart_id: rs485
  send_wait_time: 300ms

modbus_controller:
  - id: em500
    modbus_id: em500_bus
    address: 1
    setup_priority: -10
    update_interval: 5s
    command_throttle: 200ms

sensor:
  - platform: modbus_controller
    modbus_controller_id: em500
    id: em500_l1_voltage
    name: "EM500 L1 Voltage"
    register_type: read
    address: 0x0002
    value_type: U_DWORD
    unit_of_measurement: "V"
    accuracy_decimals: 2
    device_class: voltage
    state_class: measurement
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: em500
    id: em500_l2_voltage
    name: "EM500 L2 Voltage"
    register_type: read
    address: 0x0004
    value_type: U_DWORD
    unit_of_measurement: "V"
    accuracy_decimals: 2
    device_class: voltage
    state_class: measurement
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: em500
    id: em500_l3_voltage
    name: "EM500 L3 Voltage"
    register_type: read
    address: 0x0006
    value_type: U_DWORD
    unit_of_measurement: "V"
    accuracy_decimals: 2
    device_class: voltage
    state_class: measurement
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: em500
    id: em500_l1_current
    name: "EM500 L1 Current"
    register_type: read
    address: 0x0008
    value_type: U_DWORD
    unit_of_measurement: "A"
    accuracy_decimals: 4
    device_class: current
    state_class: measurement
    filters:
      - multiply: 0.0001

  - platform: modbus_controller
    modbus_controller_id: em500
    id: em500_l2_current
    name: "EM500 L2 Current"
    register_type: read
    address: 0x000A
    value_type: U_DWORD
    unit_of_measurement: "A"
    accuracy_decimals: 4
    device_class: current
    state_class: measurement
    filters:
      - multiply: 0.0001

  - platform: modbus_controller
    modbus_controller_id: em500
    id: em500_l3_current
    name: "EM500 L3 Current"
    register_type: read
    address: 0x000C
    value_type: U_DWORD
    unit_of_measurement: "A"
    accuracy_decimals: 4
    device_class: current
    state_class: measurement
    filters:
      - multiply: 0.0001

  - platform: modbus_controller
    modbus_controller_id: em500
    id: em500_l1_active_power
    name: "EM500 L1 Active Power"
    register_type: read
    address: 0x0014
    value_type: S_DWORD
    unit_of_measurement: "W"
    accuracy_decimals: 2
    device_class: power
    state_class: measurement
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: em500
    id: em500_l2_active_power
    name: "EM500 L2 Active Power"
    register_type: read
    address: 0x0016
    value_type: S_DWORD
    unit_of_measurement: "W"
    accuracy_decimals: 2
    device_class: power
    state_class: measurement
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: em500
    id: em500_l3_active_power
    name: "EM500 L3 Active Power"
    register_type: read
    address: 0x0018
    value_type: S_DWORD
    unit_of_measurement: "W"
    accuracy_decimals: 2
    device_class: power
    state_class: measurement
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: em500
    id: em500_l1_reactive_power
    name: "EM500 L1 Reactive Power"
    register_type: read
    address: 0x001A
    value_type: S_DWORD
    unit_of_measurement: "var"
    accuracy_decimals: 2
    state_class: measurement
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: em500
    id: em500_l2_reactive_power
    name: "EM500 L2 Reactive Power"
    register_type: read
    address: 0x001C
    value_type: S_DWORD
    unit_of_measurement: "var"
    accuracy_decimals: 2
    state_class: measurement
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: em500
    id: em500_l3_reactive_power
    name: "EM500 L3 Reactive Power"
    register_type: read
    address: 0x001E
    value_type: S_DWORD
    unit_of_measurement: "var"
    accuracy_decimals: 2
    state_class: measurement
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: em500
    id: em500_l1_apparent_power
    name: "EM500 L1 Apparent Power"
    register_type: read
    address: 0x0020
    value_type: U_DWORD
    unit_of_measurement: "VA"
    accuracy_decimals: 2
    state_class: measurement
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: em500
    id: em500_l2_apparent_power
    name: "EM500 L2 Apparent Power"
    register_type: read
    address: 0x0022
    value_type: U_DWORD
    unit_of_measurement: "VA"
    accuracy_decimals: 2
    state_class: measurement
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: em500
    id: em500_l3_apparent_power
    name: "EM500 L3 Apparent Power"
    register_type: read
    address: 0x0024
    value_type: U_DWORD
    unit_of_measurement: "VA"
    accuracy_decimals: 2
    state_class: measurement
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: em500
    id: em500_l1_power_factor
    name: "EM500 L1 Power Factor"
    register_type: read
    address: 0x0026
    value_type: S_DWORD
    accuracy_decimals: 4
    state_class: measurement
    filters:
      - multiply: 0.0001

  - platform: modbus_controller
    modbus_controller_id: em500
    id: em500_l2_power_factor
    name: "EM500 L2 Power Factor"
    register_type: read
    address: 0x0028
    value_type: S_DWORD
    accuracy_decimals: 4
    state_class: measurement
    filters:
      - multiply: 0.0001

  - platform: modbus_controller
    modbus_controller_id: em500
    id: em500_l3_power_factor
    name: "EM500 L3 Power Factor"
    register_type: read
    address: 0x002A
    value_type: S_DWORD
    accuracy_decimals: 4
    state_class: measurement
    filters:
      - multiply: 0.0001

  - platform: modbus_controller
    modbus_controller_id: em500
    id: em500_frequency
    name: "EM500 Frequency"
    register_type: read
    address: 0x0032
    value_type: U_DWORD
    unit_of_measurement: "Hz"
    accuracy_decimals: 3
    device_class: frequency
    state_class: measurement
    filters:
      - multiply: 0.001

  - platform: modbus_controller
    modbus_controller_id: em500
    id: em500_eqv_voltage
    name: "EM500 Eqv Phase Voltage"
    register_type: read
    address: 0x0034
    value_type: U_DWORD
    unit_of_measurement: "V"
    accuracy_decimals: 2
    device_class: voltage
    state_class: measurement
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: em500
    id: em500_eqv_line_voltage
    name: "EM500 Eqv Phase-Phase Voltage"
    register_type: read
    address: 0x0036
    value_type: U_DWORD
    unit_of_measurement: "V"
    accuracy_decimals: 2
    state_class: measurement
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: em500
    id: em500_eqv_current
    name: "EM500 Eqv Current"
    register_type: read
    address: 0x0038
    value_type: U_DWORD
    unit_of_measurement: "A"
    accuracy_decimals: 4
    device_class: current
    state_class: measurement
    filters:
      - multiply: 0.0001

  - platform: modbus_controller
    modbus_controller_id: em500
    id: em500_total_active_power
    name: "EM500 Total Active Power"
    register_type: read
    address: 0x003A
    value_type: S_DWORD
    unit_of_measurement: "W"
    accuracy_decimals: 2
    device_class: power
    state_class: measurement
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: em500
    id: em500_total_reactive_power
    name: "EM500 Total Reactive Power"
    register_type: read
    address: 0x003C
    value_type: S_DWORD
    unit_of_measurement: "var"
    accuracy_decimals: 2
    state_class: measurement
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: em500
    id: em500_total_apparent_power
    name: "EM500 Total Apparent Power"
    register_type: read
    address: 0x003E
    value_type: U_DWORD
    unit_of_measurement: "VA"
    accuracy_decimals: 2
    state_class: measurement
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: em500
    id: em500_total_power_factor
    name: "EM500 Total Power Factor"
    register_type: read
    address: 0x0040
    value_type: S_DWORD
    accuracy_decimals: 4
    state_class: measurement
    filters:
      - multiply: 0.0001

  - platform: modbus_controller
    modbus_controller_id: em500
    id: em500_total_import_active_energy
    name: "-----EM500 Total Import Active Energy"
    register_type: holding
    address: 0x1B21
    value_type: U_QWORD
    force_new_range: true
    unit_of_measurement: "kWh"
    accuracy_decimals: 2
    state_class: total_increasing
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: em500
    id: em500_total_export_active_energy
    name: "----EM500 Total Import Active Energy"
    register_type: holding
    address: 0x1B25
    value_type: U_QWORD
    force_new_range: true
    unit_of_measurement: "kWh"
    accuracy_decimals: 2
    state_class: total_increasing
    filters:
      - multiply: 0.01
      
interval:
  - interval: 10s
    then:
      - logger.log:
          level: INFO
          format: "EM500 Power = %.2f W | Frequency = %.3f Hz"
          args:
            - "id(em500_total_active_power).state"
            - "id(em500_frequency).state"
