substitutions:
  devicename: "pv-dg-controller"
  friendly_name: "PV DG Controller"

esphome:
  name: ${devicename}
  friendly_name: ${friendly_name}
  on_boot:
    priority: 200
    then:
      - delay: 5s
      - lambda: |-
          id(pv_cmd_percent_internal) = 0.0f;
          id(pv_cmd_kw_internal) = 0.0f;
          id(control_error_kw) = 0.0f;
          id(filtered_grid_total_kw) = 0.0f;
          id(filtered_gen_total_kw) = 0.0f;
          id(filtered_selected_grid_kw) = 0.0f;
      - text_sensor.template.publish:
          id: controller_state
          state: "DISABLED"

esp32:
  variant: esp32
  board: esp32dev
  framework:
    type: esp-idf

logger:
  level: DEBUG
  initial_level: WARN
  baud_rate: 115200

api:
  encryption:
    key: "SI/oZ5Qm8ZzxSGLvfIxvb3OHia5HvfN8rCkPkxMR75g="

ota:
  - platform: esphome

wifi:
  ssid: "Rao"
  password: "password123"
  ap:
    ssid: "PV-DG Fallback"
    password: "12345678"

captive_portal:

web_server:
  port: 80
  version: 3
  sorting_groups:
    - id: grp_live
      name: "Live Power"
      sorting_weight: 10
    - id: grp_energy
      name: "Energy Statistics"
      sorting_weight: 20
    - id: grp_ctrl
      name: "Controller Settings"
      sorting_weight: 30
    - id: grp_inverter
      name: "Solar Inverter"
      sorting_weight: 40
    - id: grp_service
      name: "Installer / Service"
      sorting_weight: 50
    - id: grp_io
      name: "I/O"
      sorting_weight: 60
    - id: grp_debug
      name: "Debug"
      sorting_weight: 70

time:
  - platform: sntp
    id: sntp_time

i2c:
  id: bus_a
  sda: GPIO4
  scl:
    number: GPIO15
    ignore_strapping_warning: true
  scan: true

pcf8574:
  - id: pcf_out
    address: 0x24
  - id: pcf_in
    address: 0x22

uart:
  - id: rs485
    tx_pin: GPIO27
    rx_pin: GPIO14
    baud_rate: 9600
    data_bits: 8
    parity: NONE
    stop_bits: 1

modbus:
  - id: plant_bus
    uart_id: rs485
    send_wait_time: 200ms

globals:
  - id: pv_cmd_percent_internal
    type: float
    restore_value: yes
    initial_value: '0.0'
  - id: pv_cmd_kw_internal
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: control_error_kw
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: filtered_grid_total_kw
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: filtered_gen_total_kw
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: filtered_selected_grid_kw
    type: float
    restore_value: no
    initial_value: '0.0'

modbus_controller:
  - id: grid_meter
    modbus_id: plant_bus
    address: 1
    setup_priority: -10
    update_interval: 1s
    command_throttle: 80ms

  - id: gen1_meter
    modbus_id: plant_bus
    address: 2
    setup_priority: -10
    update_interval: 1s
    command_throttle: 80ms

  - id: gen2_meter
    modbus_id: plant_bus
    address: 3
    setup_priority: -10
    update_interval: 1s
    command_throttle: 80ms

  - id: solar_inverter
    modbus_id: plant_bus
    address: 10
    setup_priority: -10
    update_interval: 1s
    command_throttle: 150ms

switch:
  # Controller enable
  - platform: template
    id: controller_enable
    name: "Controller Enable"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    web_server:
      sorting_group_id: grp_ctrl
      sorting_weight: 1

  - platform: template
    id: inverter_write_enable
    name: "Inverter Write Enable"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    web_server:
      sorting_group_id: grp_service
      sorting_weight: 1

  # KC868 outputs
  - platform: gpio
    id: relay_1
    name: "Relay 1"
    pin:
      pcf8574: pcf_out
      number: 0
      mode: OUTPUT
      inverted: true
    web_server:
      sorting_group_id: grp_io
      sorting_weight: 10

  - platform: gpio
    id: relay_2
    name: "Relay 2"
    pin:
      pcf8574: pcf_out
      number: 1
      mode: OUTPUT
      inverted: true
    web_server:
      sorting_group_id: grp_io
      sorting_weight: 11

  - platform: gpio
    id: relay_3
    name: "Relay 3"
    pin:
      pcf8574: pcf_out
      number: 2
      mode: OUTPUT
      inverted: true
    web_server:
      sorting_group_id: grp_io
      sorting_weight: 12

  - platform: gpio
    id: relay_4
    name: "Relay 4"
    pin:
      pcf8574: pcf_out
      number: 3
      mode: OUTPUT
      inverted: true
    web_server:
      sorting_group_id: grp_io
      sorting_weight: 13

  - platform: gpio
    id: relay_5
    name: "Relay 5"
    pin:
      pcf8574: pcf_out
      number: 4
      mode: OUTPUT
      inverted: true
    web_server:
      sorting_group_id: grp_io
      sorting_weight: 14

  - platform: gpio
    id: relay_6
    name: "Relay 6"
    pin:
      pcf8574: pcf_out
      number: 5
      mode: OUTPUT
      inverted: true
    web_server:
      sorting_group_id: grp_io
      sorting_weight: 15

binary_sensor:
  - platform: gpio
    name: "Input 1"
    pin:
      pcf8574: pcf_in
      number: 0
      mode: INPUT
      inverted: true
    web_server:
      sorting_group_id: grp_io
      sorting_weight: 20

  - platform: gpio
    name: "Input 2"
    pin:
      pcf8574: pcf_in
      number: 1
      mode: INPUT
      inverted: true
    web_server:
      sorting_group_id: grp_io
      sorting_weight: 21

  - platform: gpio
    name: "Input 3"
    pin:
      pcf8574: pcf_in
      number: 2
      mode: INPUT
      inverted: true
    web_server:
      sorting_group_id: grp_io
      sorting_weight: 22

  - platform: gpio
    name: "Input 4"
    pin:
      pcf8574: pcf_in
      number: 3
      mode: INPUT
      inverted: true
    web_server:
      sorting_group_id: grp_io
      sorting_weight: 23

  - platform: gpio
    name: "Input 5"
    pin:
      pcf8574: pcf_in
      number: 4
      mode: INPUT
      inverted: true
    web_server:
      sorting_group_id: grp_io
      sorting_weight: 24

  - platform: gpio
    name: "Input 6"
    pin:
      pcf8574: pcf_in
      number: 5
      mode: INPUT
      inverted: true
    web_server:
      sorting_group_id: grp_io
      sorting_weight: 25

select:
  - platform: template
    id: control_mode
    name: "Control Mode"
    optimistic: true
    restore_value: true
    options:
      - "disabled"
      - "grid_zero_export"
      - "grid_limited_export"
      - "grid_limited_import"
      - "generator_hold"
    web_server:
      sorting_group_id: grp_ctrl
      sorting_weight: 2

  - platform: template
    id: grid_phase_mode
    name: "Grid Phase Mode"
    optimistic: true
    restore_value: true
    options:
      - "total"
      - "avg"
      - "max_phase"
      - "min_phase"
    web_server:
      sorting_group_id: grp_ctrl
      sorting_weight: 3

number:
  # Controller settings
  - platform: template
    id: pv_rated_kw
    name: "PV Rated kW"
    min_value: 1
    max_value: 5000
    step: 1
    optimistic: true
    restore_value: true
    initial_value: 100
    web_server:
      sorting_group_id: grp_ctrl
      sorting_weight: 10

  - platform: template
    id: deadband_kw
    name: "Deadband kW"
    min_value: 0
    max_value: 50
    step: 0.1
    optimistic: true
    restore_value: true
    initial_value: 1.0
    web_server:
      sorting_group_id: grp_ctrl
      sorting_weight: 11

  - platform: template
    id: control_gain
    name: "Control Gain"
    min_value: 0.01
    max_value: 2.00
    step: 0.01
    optimistic: true
    restore_value: true
    initial_value: 0.20
    web_server:
      sorting_group_id: grp_ctrl
      sorting_weight: 12

  - platform: template
    id: export_limit_kw
    name: "Export Limit kW"
    min_value: 0
    max_value: 5000
    step: 0.1
    optimistic: true
    restore_value: true
    initial_value: 0
    web_server:
      sorting_group_id: grp_ctrl
      sorting_weight: 13

  - platform: template
    id: import_limit_kw
    name: "Import Limit kW"
    min_value: 0
    max_value: 5000
    step: 0.1
    optimistic: true
    restore_value: true
    initial_value: 0
    web_server:
      sorting_group_id: grp_ctrl
      sorting_weight: 14

  - platform: template
    id: generator_hold_kw
    name: "Generator Hold kW"
    min_value: 0
    max_value: 5000
    step: 0.1
    optimistic: true
    restore_value: true
    initial_value: 50
    web_server:
      sorting_group_id: grp_ctrl
      sorting_weight: 15

  - platform: template
    id: min_pv_percent
    name: "Min PV Percent"
    min_value: 0
    max_value: 100
    step: 1
    optimistic: true
    restore_value: true
    initial_value: 0
    web_server:
      sorting_group_id: grp_ctrl
      sorting_weight: 16

  - platform: template
    id: max_pv_percent
    name: "Max PV Percent"
    min_value: 0
    max_value: 100
    step: 1
    optimistic: true
    restore_value: true
    initial_value: 100
    web_server:
      sorting_group_id: grp_ctrl
      sorting_weight: 17

  - platform: template
    id: ramp_normal_pct_step
    name: "Ramp Normal pct_step"
    min_value: 0.1
    max_value: 20
    step: 0.1
    optimistic: true
    restore_value: true
    initial_value: 3.0
    web_server:
      sorting_group_id: grp_ctrl
      sorting_weight: 18

  - platform: template
    id: ramp_generator_pct_step
    name: "Ramp Generator pct_step"
    min_value: 0.1
    max_value: 10
    step: 0.1
    optimistic: true
    restore_value: true
    initial_value: 1.0
    web_server:
      sorting_group_id: grp_ctrl
      sorting_weight: 19

  # Solar inverter service settings
  - platform: modbus_controller
    id: inverter_command_kw
    name: "Inverter Command kW"
    modbus_controller_id: solar_inverter
    address: 40120
    value_type: U_WORD
    min_value: 0
    max_value: 5000
    step: 0.1
    multiply: 10
    use_write_multiple: false
    entity_category: config
    web_server:
      sorting_group_id: grp_inverter
      sorting_weight: 10

  - platform: modbus_controller
    id: inverter_remote_schedule_raw
    name: "Remote Schedule Raw"
    modbus_controller_id: solar_inverter
    address: 42014
    value_type: U_WORD
    min_value: 0
    max_value: 10
    step: 1
    use_write_multiple: false
    entity_category: config
    web_server:
      sorting_group_id: grp_service
      sorting_weight: 10

  - platform: modbus_controller
    id: inverter_active_gradient_pct_s
    name: "Active Gradient pct_s"
    modbus_controller_id: solar_inverter
    address: 42017
    value_type: U_DWORD
    min_value: 0
    max_value: 100
    step: 0.1
    multiply: 1000
    use_write_multiple: true
    entity_category: config
    web_server:
      sorting_group_id: grp_service
      sorting_weight: 11

  - platform: modbus_controller
    id: inverter_schedule_maint_time_s
    name: "Schedule Maintain Time s"
    modbus_controller_id: solar_inverter
    address: 42019
    value_type: U_DWORD
    min_value: 0
    max_value: 86400
    step: 1
    use_write_multiple: true
    entity_category: config
    web_server:
      sorting_group_id: grp_service
      sorting_weight: 12

  - platform: modbus_controller
    id: inverter_fail_protect_raw
    name: "Fail Protect Raw"
    modbus_controller_id: solar_inverter
    address: 42075
    value_type: U_WORD
    min_value: 0
    max_value: 10
    step: 1
    use_write_multiple: false
    entity_category: config
    web_server:
      sorting_group_id: grp_service
      sorting_weight: 13

  - platform: modbus_controller
    id: inverter_fail_mode_raw
    name: "Fail Active Mode Raw"
    modbus_controller_id: solar_inverter
    address: 42076
    value_type: U_WORD
    min_value: 0
    max_value: 10
    step: 1
    use_write_multiple: false
    entity_category: config
    web_server:
      sorting_group_id: grp_service
      sorting_weight: 14

  - platform: modbus_controller
    id: inverter_fail_kw
    name: "Fail Active Power kW"
    modbus_controller_id: solar_inverter
    address: 42077
    value_type: U_DWORD
    min_value: 0
    max_value: 5000
    step: 0.1
    multiply: 10
    use_write_multiple: true
    entity_category: config
    web_server:
      sorting_group_id: grp_service
      sorting_weight: 15

sensor:
  # Grid meter
  - platform: modbus_controller
    modbus_controller_id: grid_meter
    id: grid_l1_kw
    name: "Grid L1 Active Power"
    register_type: read
    address: 0x0014
    value_type: S_DWORD
    register_count: 2
    unit_of_measurement: "kW"
    accuracy_decimals: 2
    filters: [{ multiply: 0.0001 }]
    web_server:
      sorting_group_id: grp_live
      sorting_weight: 10

  - platform: modbus_controller
    modbus_controller_id: grid_meter
    id: grid_l2_kw
    name: "Grid L2 Active Power"
    register_type: read
    address: 0x0016
    value_type: S_DWORD
    register_count: 2
    unit_of_measurement: "kW"
    accuracy_decimals: 2
    filters: [{ multiply: 0.0001 }]
    web_server:
      sorting_group_id: grp_live
      sorting_weight: 11

  - platform: modbus_controller
    modbus_controller_id: grid_meter
    id: grid_l3_kw
    name: "Grid L3 Active Power"
    register_type: read
    address: 0x0018
    value_type: S_DWORD
    register_count: 2
    unit_of_measurement: "kW"
    accuracy_decimals: 2
    filters: [{ multiply: 0.0001 }]
    web_server:
      sorting_group_id: grp_live
      sorting_weight: 12

  - platform: modbus_controller
    modbus_controller_id: grid_meter
    id: grid_total_kw
    name: "Grid Total Active Power"
    register_type: read
    address: 0x003A
    value_type: S_DWORD
    register_count: 2
    unit_of_measurement: "kW"
    accuracy_decimals: 2
    filters: [{ multiply: 0.0001 }]
    web_server:
      sorting_group_id: grp_live
      sorting_weight: 13

  - platform: modbus_controller
    modbus_controller_id: grid_meter
    id: grid_freq
    name: "Grid Frequency"
    register_type: read
    address: 0x0032
    value_type: U_DWORD
    register_count: 2
    unit_of_measurement: "Hz"
    accuracy_decimals: 3
    filters: [{ multiply: 0.001 }]
    web_server:
      sorting_group_id: grp_live
      sorting_weight: 14

  - platform: modbus_controller
    modbus_controller_id: grid_meter
    id: grid_import_kwh
    name: "Grid Import Energy"
    register_type: read
    address: 0x1B21
    value_type: U_QWORD
    register_count: 4
    unit_of_measurement: "kWh"
    accuracy_decimals: 2
    filters: [{ multiply: 0.01 }]
    web_server:
      sorting_group_id: grp_energy
      sorting_weight: 10

  - platform: modbus_controller
    modbus_controller_id: grid_meter
    id: grid_export_kwh
    name: "Grid Export Energy"
    register_type: read
    address: 0x1B25
    value_type: U_QWORD
    register_count: 4
    unit_of_measurement: "kWh"
    accuracy_decimals: 2
    filters: [{ multiply: 0.01 }]
    web_server:
      sorting_group_id: grp_energy
      sorting_weight: 11

  # Gen1 meter
  - platform: modbus_controller
    modbus_controller_id: gen1_meter
    id: gen1_total_kw
    name: "Gen1 Total Active Power"
    register_type: read
    address: 0x003A
    value_type: S_DWORD
    register_count: 2
    unit_of_measurement: "kW"
    accuracy_decimals: 2
    filters: [{ multiply: 0.0001 }]
    web_server:
      sorting_group_id: grp_live
      sorting_weight: 20

  - platform: modbus_controller
    modbus_controller_id: gen1_meter
    id: gen1_kwh
    name: "Gen1 Energy"
    register_type: read
    address: 0x1B21
    value_type: U_QWORD
    register_count: 4
    unit_of_measurement: "kWh"
    accuracy_decimals: 2
    filters: [{ multiply: 0.01 }]
    web_server:
      sorting_group_id: grp_energy
      sorting_weight: 20

  # Gen2 meter
  - platform: modbus_controller
    modbus_controller_id: gen2_meter
    id: gen2_total_kw
    name: "Gen2 Total Active Power"
    register_type: read
    address: 0x003A
    value_type: S_DWORD
    register_count: 2
    unit_of_measurement: "kW"
    accuracy_decimals: 2
    filters: [{ multiply: 0.0001 }]
    web_server:
      sorting_group_id: grp_live
      sorting_weight: 21

  - platform: modbus_controller
    modbus_controller_id: gen2_meter
    id: gen2_kwh
    name: "Gen2 Energy"
    register_type: read
    address: 0x1B21
    value_type: U_QWORD
    register_count: 4
    unit_of_measurement: "kWh"
    accuracy_decimals: 2
    filters: [{ multiply: 0.01 }]
    web_server:
      sorting_group_id: grp_energy
      sorting_weight: 21

  # Solar inverter reads
  - platform: modbus_controller
    modbus_controller_id: solar_inverter
    id: inverter_pmax_kw
    name: "Solar Inverter Pmax"
    register_type: read
    address: 30083
    value_type: U_DWORD
    register_count: 2
    unit_of_measurement: "kW"
    accuracy_decimals: 3
    filters: [{ multiply: 0.001 }]
    web_server:
      sorting_group_id: grp_inverter
      sorting_weight: 1

  - platform: modbus_controller
    modbus_controller_id: solar_inverter
    id: inverter_actual_kw
    name: "Solar Inverter Actual Power"
    register_type: read
    address: 32080
    value_type: S_DWORD
    register_count: 2
    unit_of_measurement: "kW"
    accuracy_decimals: 3
    filters: [{ multiply: 0.001 }]
    web_server:
      sorting_group_id: grp_inverter
      sorting_weight: 2

  # Derived live values
  - platform: template
    id: grid_avg_phase_kw
    name: "Grid Avg Phase Power"
    unit_of_measurement: "kW"
    accuracy_decimals: 2
    lambda: |-
      return (id(grid_l1_kw).state + id(grid_l2_kw).state + id(grid_l3_kw).state) / 3.0;
    web_server:
      sorting_group_id: grp_live
      sorting_weight: 30

  - platform: template
    id: grid_max_phase_kw
    name: "Grid Max Phase Power"
    unit_of_measurement: "kW"
    accuracy_decimals: 2
    lambda: |-
      float a = id(grid_l1_kw).state;
      float b = id(grid_l2_kw).state;
      float c = id(grid_l3_kw).state;
      float m = a;
      if (b > m) m = b;
      if (c > m) m = c;
      return m;
    web_server:
      sorting_group_id: grp_live
      sorting_weight: 31

  - platform: template
    id: grid_min_phase_kw
    name: "Grid Min Phase Power"
    unit_of_measurement: "kW"
    accuracy_decimals: 2
    lambda: |-
      float a = id(grid_l1_kw).state;
      float b = id(grid_l2_kw).state;
      float c = id(grid_l3_kw).state;
      float m = a;
      if (b < m) m = b;
      if (c < m) m = c;
      return m;
    web_server:
      sorting_group_id: grp_live
      sorting_weight: 32

  - platform: template
    id: gen_total_kw
    name: "Generators Total Power"
    unit_of_measurement: "kW"
    accuracy_decimals: 2
    lambda: |-
      if (isnan(id(gen1_total_kw).state) || isnan(id(gen2_total_kw).state)) return NAN;
      return id(gen1_total_kw).state + id(gen2_total_kw).state;
    web_server:
      sorting_group_id: grp_live
      sorting_weight: 33

  - platform: template
    id: site_load_kw
    name: "Site Load"
    unit_of_measurement: "kW"
    accuracy_decimals: 2
    lambda: |-
      if (isnan(id(grid_total_kw).state) || isnan(id(inverter_actual_kw).state)) return NAN;
      float g1 = isnan(id(gen1_total_kw).state) ? 0.0f : id(gen1_total_kw).state;
      float g2 = isnan(id(gen2_total_kw).state) ? 0.0f : id(gen2_total_kw).state;
      return id(grid_total_kw).state + g1 + g2 + id(inverter_actual_kw).state;
    web_server:
      sorting_group_id: grp_live
      sorting_weight: 34

  - platform: template
    id: selected_grid_control_kw
    name: "Selected Grid Control Power"
    unit_of_measurement: "kW"
    accuracy_decimals: 2
    lambda: |-
      if (id(grid_phase_mode).state == "avg") return id(grid_avg_phase_kw).state;
      if (id(grid_phase_mode).state == "max_phase") return id(grid_max_phase_kw).state;
      if (id(grid_phase_mode).state == "min_phase") return id(grid_min_phase_kw).state;
      return id(grid_total_kw).state;
    web_server:
      sorting_group_id: grp_live
      sorting_weight: 35

  - platform: template
    id: pv_command_percent_sensor
    name: "PV Command Percent"
    unit_of_measurement: "%"
    accuracy_decimals: 1
    lambda: |-
      return id(pv_cmd_percent_internal);
    web_server:
      sorting_group_id: grp_inverter
      sorting_weight: 3

  - platform: template
    id: pv_command_kw_sensor
    name: "PV Command kW"
    unit_of_measurement: "kW"
    accuracy_decimals: 2
    lambda: |-
      return id(pv_cmd_kw_internal);
    web_server:
      sorting_group_id: grp_inverter
      sorting_weight: 4

  - platform: template
    id: controller_error_sensor
    name: "Controller Error"
    unit_of_measurement: "kW"
    accuracy_decimals: 2
    lambda: |-
      return id(control_error_kw);
    web_server:
      sorting_group_id: grp_debug
      sorting_weight: 1

  - platform: total_daily_energy
    name: "Solar Daily Energy"
    power_id: inverter_actual_kw
    unit_of_measurement: "kWh"
    accuracy_decimals: 2
    method: right
    web_server:
      sorting_group_id: grp_energy
      sorting_weight: 30

text_sensor:
  - platform: template
    id: controller_state
    name: "Controller State"
    web_server:
      sorting_group_id: grp_ctrl
      sorting_weight: 4

button:
  - platform: restart
    name: "Restart Controller"
    web_server:
      sorting_group_id: grp_debug
      sorting_weight: 10

  - platform: template
    name: "Debug ON"
    web_server:
      sorting_group_id: grp_debug
      sorting_weight: 11
    on_press:
      - logger.set_level: DEBUG

  - platform: template
    name: "Debug INFO"
    web_server:
      sorting_group_id: grp_debug
      sorting_weight: 12
    on_press:
      - logger.set_level: INFO

  - platform: template
    name: "Debug WARN"
    web_server:
      sorting_group_id: grp_debug
      sorting_weight: 13
    on_press:
      - logger.set_level: WARN

interval:
  - interval: 1s
    then:
      - lambda: |-
          if (!isnan(id(grid_total_kw).state))
            id(filtered_grid_total_kw) = 0.7f * id(filtered_grid_total_kw) + 0.3f * id(grid_total_kw).state;

          float gen_sum = 0.0f;
          bool gen_ok = false;
          if (!isnan(id(gen1_total_kw).state)) { gen_sum += id(gen1_total_kw).state; gen_ok = true; }
          if (!isnan(id(gen2_total_kw).state)) { gen_sum += id(gen2_total_kw).state; gen_ok = true; }
          if (gen_ok)
            id(filtered_gen_total_kw) = 0.7f * id(filtered_gen_total_kw) + 0.3f * gen_sum;

          if (!isnan(id(selected_grid_control_kw).state))
            id(filtered_selected_grid_kw) = 0.7f * id(filtered_selected_grid_kw) + 0.3f * id(selected_grid_control_kw).state;

  - interval: 1s
    then:
      - if:
          condition:
            switch.is_on: controller_enable
          then:
            - lambda: |-
                float measure_kw = 0.0f;
                float target_kw = 0.0f;
                float error_kw = 0.0f;
                float gain = id(control_gain).state;
                float deadband = id(deadband_kw).state;
                float pv_pct = id(pv_cmd_percent_internal);
                float ramp = id(ramp_normal_pct_step).state;

                if (id(control_mode).state == "generator_hold") {
                  measure_kw = id(filtered_gen_total_kw);
                  target_kw = id(generator_hold_kw).state;
                  ramp = id(ramp_generator_pct_step).state;
                  id(controller_state).publish_state("GENERATOR HOLD");
                } else if (id(control_mode).state == "grid_zero_export") {
                  measure_kw = id(filtered_selected_grid_kw);
                  target_kw = 0.0f;
                  id(controller_state).publish_state("GRID ZERO EXPORT");
                } else if (id(control_mode).state == "grid_limited_export") {
                  measure_kw = id(filtered_selected_grid_kw);
                  target_kw = -1.0f * id(export_limit_kw).state;
                  id(controller_state).publish_state("GRID LIMITED EXPORT");
                } else if (id(control_mode).state == "grid_limited_import") {
                  measure_kw = id(filtered_selected_grid_kw);
                  target_kw = id(import_limit_kw).state;
                  id(controller_state).publish_state("GRID LIMITED IMPORT");
                } else {
                  id(controller_state).publish_state("DISABLED");
                  return;
                }

                error_kw = target_kw - measure_kw;
                id(control_error_kw) = error_kw;

                if (fabsf(error_kw) >= deadband) {
                  float delta_pct = (error_kw / fmaxf(id(pv_rated_kw).state, 1.0f)) * 100.0f * gain;
                  if (delta_pct > ramp) delta_pct = ramp;
                  if (delta_pct < -ramp) delta_pct = -ramp;
                  pv_pct += delta_pct;
                }

                if (pv_pct < id(min_pv_percent).state) pv_pct = id(min_pv_percent).state;
                if (pv_pct > id(max_pv_percent).state) pv_pct = id(max_pv_percent).state;

                id(pv_cmd_percent_internal) = pv_pct;
                id(pv_cmd_kw_internal) = (pv_pct / 100.0f) * id(pv_rated_kw).state;

            - if:
                condition:
                  switch.is_on: inverter_write_enable
                then:
                  - number.set:
                      id: inverter_command_kw
                      value: !lambda "return id(pv_cmd_kw_internal);"

      - if:
          condition:
            not:
              switch.is_on: controller_enable
          then:
            - lambda: |-
                id(controller_state).publish_state("DISABLED");