esphome:
  name: kc-board
  friendly_name: kc-board

esp32:
  variant: esp32
  board: esp32dev
  framework:
    type: esp-idf

logger:
  level: DEBUG

api:
  encryption:
    key: 'SI/oZ5Qm8ZzxSGLvfIxvb3OHia5HvfN8rCkPkxMR75g='

ota:
  - platform: esphome

wifi:
  ssid: 'Rao'
  password: 'password123'

  ap:
    ssid: 'Kc-Board Fallback Hotspot'
    password: '12345678'

captive_portal:

web_server:
  port: 80

i2c:
  id: bus_a
  sda: GPIO4
  scl:
    number: GPIO15
    ignore_strapping_warning: true
  scan: true

pcf8574:
  - id: pcf_out
    address: 0x24
  - id: pcf_in
    address: 0x22

switch:
  - platform: gpio
    id: relay_1
    name: 'KC868-A6 Relay 1'
    pin:
      pcf8574: pcf_out
      number: 0
      mode: OUTPUT
      inverted: true

  - platform: gpio
    id: relay_2
    name: 'KC868-A6 Relay 2'
    pin:
      pcf8574: pcf_out
      number: 1
      mode: OUTPUT
      inverted: true

  - platform: gpio
    id: relay_3
    name: 'KC868-A6 Relay 3'
    pin:
      pcf8574: pcf_out
      number: 2
      mode: OUTPUT
      inverted: true

  - platform: gpio
    id: relay_4
    name: 'KC868-A6 Relay 4'
    pin:
      pcf8574: pcf_out
      number: 3
      mode: OUTPUT
      inverted: true

  - platform: gpio
    id: relay_5
    name: 'KC868-A6 Relay 5'
    pin:
      pcf8574: pcf_out
      number: 4
      mode: OUTPUT
      inverted: true

  - platform: gpio
    id: relay_6
    name: 'KC868-A6 Relay 6'
    pin:
      pcf8574: pcf_out
      number: 5
      mode: OUTPUT
      inverted: true

binary_sensor:
  - platform: gpio
    name: 'KC868-A6 Input 1'
    pin:
      pcf8574: pcf_in
      number: 0
      mode: INPUT
      inverted: true

  - platform: gpio
    name: 'KC868-A6 Input 2'
    pin:
      pcf8574: pcf_in
      number: 1
      mode: INPUT
      inverted: true

  - platform: gpio
    name: 'KC868-A6 Input 3'
    pin:
      pcf8574: pcf_in
      number: 2
      mode: INPUT
      inverted: true

  - platform: gpio
    name: 'KC868-A6 Input 4'
    pin:
      pcf8574: pcf_in
      number: 3
      mode: INPUT
      inverted: true

  - platform: gpio
    name: 'KC868-A6 Input 5'
    pin:
      pcf8574: pcf_in
      number: 4
      mode: INPUT
      inverted: true

  - platform: gpio
    name: 'KC868-A6 Input 6'
    pin:
      pcf8574: pcf_in
      number: 5
      mode: INPUT
      inverted: true

uart:
  - id: rs485
    tx_pin: GPIO27
    rx_pin: GPIO14
    baud_rate: 9600
    data_bits: 8
    parity: NONE
    stop_bits: 1

modbus:
  - id: em500_bus
    uart_id: rs485
    send_wait_time: 200ms

modbus_controller:
  - id: em500
    address: 1
    modbus_id: em500_bus
    setup_priority: -10
    update_interval: 2s
    command_throttle: 100ms

sensor:
  # Phase-to-neutral voltages: 0002H, 0004H, 0006H, V/100, unsigned long
  - platform: modbus_controller
    modbus_controller_id: em500
    id: em500_l1_voltage
    name: 'EM500 L1 Voltage'
    register_type: read
    address: 0x0002
    value_type: U_DWORD
    register_count: 2
    unit_of_measurement: 'V'
    accuracy_decimals: 2
    device_class: voltage
    state_class: measurement
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: em500
    id: em500_l2_voltage
    name: 'EM500 L2 Voltage'
    register_type: read
    address: 0x0004
    value_type: U_DWORD
    register_count: 2
    unit_of_measurement: 'V'
    accuracy_decimals: 2
    device_class: voltage
    state_class: measurement
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: em500
    id: em500_l3_voltage
    name: 'EM500 L3 Voltage'
    register_type: read
    address: 0x0006
    value_type: U_DWORD
    register_count: 2
    unit_of_measurement: 'V'
    accuracy_decimals: 2
    device_class: voltage
    state_class: measurement
    filters:
      - multiply: 0.01

  # Currents: 0008H, 000AH, 000CH, A/10000, unsigned long
  - platform: modbus_controller
    modbus_controller_id: em500
    id: em500_l1_current
    name: 'EM500 L1 Current'
    register_type: read
    address: 0x0008
    value_type: U_DWORD
    register_count: 2
    unit_of_measurement: 'A'
    accuracy_decimals: 4
    device_class: current
    state_class: measurement
    filters:
      - multiply: 0.0001

  - platform: modbus_controller
    modbus_controller_id: em500
    id: em500_l2_current
    name: 'EM500 L2 Current'
    register_type: read
    address: 0x000A
    value_type: U_DWORD
    register_count: 2
    unit_of_measurement: 'A'
    accuracy_decimals: 4
    device_class: current
    state_class: measurement
    filters:
      - multiply: 0.0001

  - platform: modbus_controller
    modbus_controller_id: em500
    id: em500_l3_current
    name: 'EM500 L3 Current'
    register_type: read
    address: 0x000C
    value_type: U_DWORD
    register_count: 2
    unit_of_measurement: 'A'
    accuracy_decimals: 4
    device_class: current
    state_class: measurement
    filters:
      - multiply: 0.0001

  - platform: modbus_controller
    modbus_controller_id: em500
    id: em500_neutral_current
    name: 'EM500 Neutral Current'
    register_type: read
    address: 0x0048
    value_type: U_DWORD
    register_count: 2
    unit_of_measurement: 'A'
    accuracy_decimals: 4
    device_class: current
    state_class: measurement
    filters:
      - multiply: 0.0001

  # Line-line voltages: 000EH, 0010H, 0012H, V/100
  - platform: modbus_controller
    modbus_controller_id: em500
    name: 'EM500 L1-L2 Voltage'
    register_type: read
    address: 0x000E
    value_type: U_DWORD
    register_count: 2
    unit_of_measurement: 'V'
    accuracy_decimals: 2
    state_class: measurement
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: em500
    name: 'EM500 L2-L3 Voltage'
    register_type: read
    address: 0x0010
    value_type: U_DWORD
    register_count: 2
    unit_of_measurement: 'V'
    accuracy_decimals: 2
    state_class: measurement
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: em500
    name: 'EM500 L3-L1 Voltage'
    register_type: read
    address: 0x0012
    value_type: U_DWORD
    register_count: 2
    unit_of_measurement: 'V'
    accuracy_decimals: 2
    state_class: measurement
    filters:
      - multiply: 0.01

  # Active power per phase: 0014H, 0016H, 0018H, W/100, signed long
  - platform: modbus_controller
    modbus_controller_id: em500
    id: em500_l1_active_power
    name: 'EM500 L1 Active Power'
    register_type: read
    address: 0x0014
    value_type: S_DWORD
    register_count: 2
    unit_of_measurement: 'W'
    accuracy_decimals: 2
    device_class: power
    state_class: measurement
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: em500
    id: em500_l2_active_power
    name: 'EM500 L2 Active Power'
    register_type: read
    address: 0x0016
    value_type: S_DWORD
    register_count: 2
    unit_of_measurement: 'W'
    accuracy_decimals: 2
    device_class: power
    state_class: measurement
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: em500
    id: em500_l3_active_power
    name: 'EM500 L3 Active Power'
    register_type: read
    address: 0x0018
    value_type: S_DWORD
    register_count: 2
    unit_of_measurement: 'W'
    accuracy_decimals: 2
    device_class: power
    state_class: measurement
    filters:
      - multiply: 0.01

  # Equivalent totals: 0032H frequency, 0038H current, 003AH active power, 003CH reactive, 003EH apparent, 0040H PF
  - platform: modbus_controller
    modbus_controller_id: em500
    id: em500_frequency
    name: 'EM500 Frequency'
    register_type: read
    address: 0x0032
    value_type: U_DWORD
    register_count: 2
    unit_of_measurement: 'Hz'
    accuracy_decimals: 3
    device_class: frequency
    state_class: measurement
    filters:
      - multiply: 0.001

  - platform: modbus_controller
    modbus_controller_id: em500
    id: em500_eqv_voltage
    name: 'EM500 Eqv Phase Voltage'
    register_type: read
    address: 0x0034
    value_type: U_DWORD
    register_count: 2
    unit_of_measurement: 'V'
    accuracy_decimals: 2
    device_class: voltage
    state_class: measurement
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: em500
    id: em500_eqv_line_voltage
    name: 'EM500 Eqv Phase-Phase Voltage'
    register_type: read
    address: 0x0036
    value_type: U_DWORD
    register_count: 2
    unit_of_measurement: 'V'
    accuracy_decimals: 2
    state_class: measurement
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: em500
    id: em500_eqv_current
    name: 'EM500 Eqv Current'
    register_type: read
    address: 0x0038
    value_type: U_DWORD
    register_count: 2
    unit_of_measurement: 'A'
    accuracy_decimals: 4
    device_class: current
    state_class: measurement
    filters:
      - multiply: 0.0001

  - platform: modbus_controller
    modbus_controller_id: em500
    id: em500_total_active_power
    name: 'EM500 Total Active Power'
    register_type: read
    address: 0x003A
    value_type: S_DWORD
    register_count: 2
    unit_of_measurement: 'W'
    accuracy_decimals: 2
    device_class: power
    state_class: measurement
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: em500
    id: em500_total_reactive_power
    name: 'EM500 Total Reactive Power'
    register_type: read
    address: 0x003C
    value_type: S_DWORD
    register_count: 2
    unit_of_measurement: 'var'
    accuracy_decimals: 2
    state_class: measurement
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: em500
    id: em500_total_apparent_power
    name: 'EM500 Total Apparent Power'
    register_type: read
    address: 0x003E
    value_type: U_DWORD
    register_count: 2
    unit_of_measurement: 'VA'
    accuracy_decimals: 2
    state_class: measurement
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: em500
    id: em500_total_power_factor
    name: 'EM500 Total Power Factor'
    register_type: read
    address: 0x0040
    value_type: S_DWORD
    register_count: 2
    accuracy_decimals: 4
    state_class: measurement
    filters:
      - multiply: 0.0001

  # Asymmetry
  - platform: modbus_controller
    modbus_controller_id: em500
    name: 'EM500 Phase-Phase Voltage Asymmetry'
    register_type: read
    address: 0x0042
    value_type: U_DWORD
    register_count: 2
    unit_of_measurement: '%'
    accuracy_decimals: 2
    state_class: measurement
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: em500
    name: 'EM500 Phase-Neutral Voltage Asymmetry'
    register_type: read
    address: 0x0044
    value_type: U_DWORD
    register_count: 2
    unit_of_measurement: '%'
    accuracy_decimals: 2
    state_class: measurement
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: em500
    name: 'EM500 Current Asymmetry'
    register_type: read
    address: 0x0046
    value_type: U_DWORD
    register_count: 2
    unit_of_measurement: '%'
    accuracy_decimals: 2
    state_class: measurement
    filters:
      - multiply: 0.01

  # Energy counters: table shows 4 words, kWh/100, unsigned long
  # In ESPHome this is best treated as 64-bit unsigned.
  - platform: modbus_controller
    modbus_controller_id: em500
    id: em500_total_import_active_energy
    name: 'EM500 Total Import Active Energy'
    register_type: read
    address: 0x1B20
    value_type: U_QWORD
    register_count: 4
    unit_of_measurement: 'kWh'
    accuracy_decimals: 2
    device_class: energy
    state_class: total_increasing
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: em500
    id: em500_total_export_active_energy
    name: 'EM500 Total Export Active Energy'
    register_type: read
    address: 0x1B24
    value_type: U_QWORD
    register_count: 4
    unit_of_measurement: 'kWh'
    accuracy_decimals: 2
    device_class: energy
    state_class: total_increasing
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: em500
    id: em500_total_import_reactive_energy
    name: 'EM500 Total Import Reactive Energy'
    register_type: read
    address: 0x1B28
    value_type: U_QWORD
    register_count: 4
    unit_of_measurement: 'kvarh'
    accuracy_decimals: 2
    state_class: total_increasing
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: em500
    id: em500_total_export_reactive_energy
    name: 'EM500 Total Export Reactive Energy'
    register_type: read
    address: 0x1B2C
    value_type: U_QWORD
    register_count: 4
    unit_of_measurement: 'kvarh'
    accuracy_decimals: 2
    state_class: total_increasing
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: em500
    id: em500_total_apparent_energy
    name: 'EM500 Total Apparent Energy'
    register_type: read
    address: 0x1B30
    value_type: U_QWORD
    register_count: 4
    unit_of_measurement: 'kVAh'
    accuracy_decimals: 2
    state_class: total_increasing
    filters:
      - multiply: 0.01

text_sensor:
  - platform: template
    name: 'EM500 Status'
    lambda: |-
      return {"Online"};

interval:
  - interval: 10s
    then:
      - logger.log:
          level: INFO
          format: 'EM500 Total Active Power: %.2f W | Frequency: %.3f Hz'
          args:
            ['id(em500_total_active_power).state', 'id(em500_frequency).state']
