- platform: modbus_controller
  id: inv1_command_kw_reg
  internal: true
  modbus_controller_id: inv1_hub
  address: 40120
  value_type: U_WORD
  min_value: 0
  max_value: 10000
  step: 0.1
  multiply: 10
  use_write_multiple: false

- platform: modbus_controller
  id: inv1_remote_schedule_raw
  name: "INV 1 Remote Scheduling Raw (42014)"
  modbus_controller_id: inv1_hub
  address: 42014
  value_type: U_WORD
  min_value: 0
  max_value: 10
  step: 1
  use_write_multiple: false
  entity_category: config
  web_server:
    sorting_group_id: grp_service
    sorting_weight: 10

- platform: modbus_controller
  id: inv1_active_gradient_pct_s
  name: "INV 1 Active Gradient %/s (42017)"
