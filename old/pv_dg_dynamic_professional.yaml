switch:

- platform: template
  id: controller_enable
  name: "Controller Enable"
  optimistic: true
  restore_mode: RESTORE_DEFAULT_OFF
  web_server:
    sorting_group_id: grp_control
    sorting_weight: 1

- platform: template
  id: inverter_write_enable
  name: "Write Commands To Inverters"
  optimistic: true
  restore_mode: RESTORE_DEFAULT_OFF
  web_server:
    sorting_group_id: grp_control
    sorting_weight: 2

- platform: template
  id: grid1_enable
  name: "Enable Grid Meter 1"
  optimistic: true
  restore_mode: RESTORE_DEFAULT_ON
  web_server:
    sorting_group_id: grp_inventory
    sorting_weight: 11
  on_turn_on:
    - component.resume: grid1_meter
  on_turn_off:
    - component.suspend: grid1_meter
    - binary_sensor.template.publish:
        id: grid1_online
        state: false

- platform: template
