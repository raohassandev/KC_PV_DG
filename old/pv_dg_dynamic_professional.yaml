- platform: gpio
  id: relay_1
  name: "Relay 1"
  pin:
    pcf8574: pcf_out
    number: 0
    mode: OUTPUT
    inverted: true
  web_server:
    sorting_group_id: grp_io
    sorting_weight: 11

- platform: gpio
  id: relay_2
  name: "Relay 2"
  pin:
    pcf8574: pcf_out
    number: 1
    mode: OUTPUT
    inverted: true
  web_server:
    sorting_group_id: grp_io
    sorting_weight: 12

- platform: gpio
