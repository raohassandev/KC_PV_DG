interval:

- interval: 15s
  then:
    - if:
        condition:
          switch.is_on: grid1_enable
        then:
          - component.resume: grid1_meter
        else:
          - component.suspend: grid1_meter
    - if:
        condition:
          switch.is_on: grid2_enable
        then:
          - component.resume: grid2_meter
        else:
          - component.suspend: grid2_meter
    - if:
        condition:
          switch.is_on: gen1_enable
        then:
          - component.resume: gen1_meter
        else:
          - component.suspend: gen1_meter
    - if:
        condition:
          switch.is_on: gen2_enable
        then:
          - component.resume: gen2_meter
        else:
          - component.suspend: gen2_meter
    - if:
        condition:
          switch.is_on: gen3_enable
        then:
          - component.resume: gen3_meter
        else:
          - component.suspend: gen3_meter
    - if:
        condition:
          switch.is_on: gen4_enable
        then:
          - component.resume: gen4_meter
        else:
          - component.suspend: gen4_meter
    - if:
        condition:
          switch.is_on: inv1_enable
        then:
          - component.resume: inv1_hub
        else:
          - component.suspend: inv1_hub
    - if:
        condition:
          switch.is_on: inv2_enable
        then:
          - component.resume: inv2_hub
        else:
          - component.suspend: inv2_hub
    - if:
        condition:
          switch.is_on: inv3_enable
        then:
          - component.resume: inv3_hub
        else:
          - component.suspend: inv3_hub

- interval: 1s
  then:
    - lambda: |-
        if (!isnan(id(selected_grid_control_kw).state))
          id(filtered_selected_grid_kw) = 0.7f * id(filtered_selected_grid_kw) + 0.3f * id(selected_grid_control_kw).state;
        if (!isnan(id(site_gen_total_kw).state))
          id(filtered_gen_total_kw) = 0.7f * id(filtered_gen_total_kw) + 0.3f * id(site_gen_total_kw).state;

- interval: 1s
  then:
    - if:
        condition:
          switch.is_on: controller_enable
        then:
          - lambda: |-
              const float online_pv_rated = id(site_online_pv_rated_kw).state;
              if (online_pv_rated <= 0.0f) {
                id(controller_state).publish_state("NO INVERTER ONLINE");
                id(control_error_kw) = 0.0f;
                id(pv_cmd_percent_internal) = 0.0f;
                id(pv_cmd_kw_internal) = 0.0f;
                id(inv1_cmd_kw_internal) = 0.0f;
                id(inv2_cmd_kw_internal) = 0.0f;
                id(inv3_cmd_kw_internal) = 0.0f;
                return;
              }

              float measure_kw = 0.0f;
              float target_kw = 0.0f;
              float error_kw = 0.0f;
              float gain = id(control_gain).state;
              float deadband = id(deadband_kw).state;
              float pv_pct = id(pv_cmd_percent_internal);
              float ramp = id(ramp_normal_pct_step).state;

              if (id(control_mode).state == "generator_hold") {
                measure_kw = id(filtered_gen_total_kw);
                target_kw = id(generator_hold_kw).state;
                ramp = id(ramp_generator_pct_step).state;
                id(controller_state).publish_state("GENERATOR HOLD");
              } else if (id(control_mode).state == "grid_zero_export") {
                measure_kw = id(filtered_selected_grid_kw);
                target_kw = 0.0f;
                id(controller_state).publish_state("GRID ZERO EXPORT");
              } else if (id(control_mode).state == "grid_limited_export") {
                measure_kw = id(filtered_selected_grid_kw);
                target_kw = -1.0f * id(export_limit_kw).state;
                id(controller_state).publish_state("GRID LIMITED EXPORT");
              } else if (id(control_mode).state == "grid_limited_import") {
                measure_kw = id(filtered_selected_grid_kw);
                target_kw = id(import_limit_kw).state;
                id(controller_state).publish_state("GRID LIMITED IMPORT");
              } else {
                id(controller_state).publish_state("DISABLED");
                return;
              }

              error_kw = target_kw - measure_kw;
              id(control_error_kw) = error_kw;

              if (fabsf(error_kw) >= deadband) {
                float delta_pct = (error_kw / fmaxf(online_pv_rated, 0.1f)) * 100.0f * gain;
                if (delta_pct > ramp) delta_pct = ramp;
                if (delta_pct < -ramp) delta_pct = -ramp;
                pv_pct += delta_pct;
              }

              if (pv_pct < id(min_pv_percent).state) pv_pct = id(min_pv_percent).state;
              if (pv_pct > id(max_pv_percent).state) pv_pct = id(max_pv_percent).state;

              id(pv_cmd_percent_internal) = pv_pct;
              id(pv_cmd_kw_internal) = (pv_pct / 100.0f) * online_pv_rated;

              const float r1 = (id(inv1_enable).state && id(inv1_online).state) ? id(inv1_rated_kw).state : 0.0f;
              const float r2 = (id(inv2_enable).state && id(inv2_online).state) ? id(inv2_rated_kw).state : 0.0f;
              const float r3 = (id(inv3_enable).state && id(inv3_online).state) ? id(inv3_rated_kw).state : 0.0f;
              const float rt = r1 + r2 + r3;

              id(inv1_cmd_kw_internal) = (rt > 0.0f && r1 > 0.0f) ? (id(pv_cmd_kw_internal) * r1 / rt) : 0.0f;
              id(inv2_cmd_kw_internal) = (rt > 0.0f && r2 > 0.0f) ? (id(pv_cmd_kw_internal) * r2 / rt) : 0.0f;
              id(inv3_cmd_kw_internal) = (rt > 0.0f && r3 > 0.0f) ? (id(pv_cmd_kw_internal) * r3 / rt) : 0.0f;

          - if:
              condition:
                switch.is_on: inverter_write_enable
              then:
                - if:
                    condition:
                      and:
                        - switch.is_on: inv1_enable
                        - binary_sensor.is_on: inv1_online
                    then:
                      - number.set:
                          id: inv1_command_kw_reg
                          value: !lambda "return id(inv1_cmd_kw_internal);"
                - if:
                    condition:
                      and:
                        - switch.is_on: inv2_enable
                        - binary_sensor.is_on: inv2_online
                    then:
                      - number.set:
                          id: inv2_command_kw_reg
                          value: !lambda "return id(inv2_cmd_kw_internal);"
                - if:
                    condition:
                      and:
                        - switch.is_on: inv3_enable
                        - binary_sensor.is_on: inv3_online
                    then:
                      - number.set:
                          id: inv3_command_kw_reg
                          value: !lambda "return id(inv3_cmd_kw_internal);"
    - if:
        condition:
          not:
            switch.is_on: controller_enable
        then:
          - lambda: |-
              id(controller_state).publish_state("DISABLED");
              id(control_error_kw) = 0.0f;
