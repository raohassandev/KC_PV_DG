- id: inv1_hub
  modbus_id: plant_bus
  address: ${inv1_addr}
  setup_priority: -10
  update_interval: 3s
  command_throttle: 300ms
  offline_skip_updates: 12
  max_cmd_retries: 1
  on_online:
    then:
      - binary_sensor.template.publish:
          id: inv1_online
          state: true
  on_offline:
