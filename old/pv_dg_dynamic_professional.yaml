
# Multi-source PV-DG controller for KC868-A6 / ESP32
# - Runtime enable/disable of source polling using component.suspend/component.resume
# - Site-specific slave IDs stay compile-time substitutions at the top of this file
# - Huawei registers verified against Huawei Modbus Interface Definitions V3.0:
#   32080 active power, 30083 Pmax_real, 40120 active power fixed value derating,
#   42014 remote power scheduling, 42017 active power gradient,
#   42019 scheduling instruction maintenance time,
#   42075 communication link disconnection failure protection,
#   42076 fail-safe active power mode,
#   42077 fail-safe active power limit
# - EM500 registers verified against uploaded EM500 register map:
#   0x0014/0x0016/0x0018 phase active power, 0x0032 frequency,
#   0x003A equivalent total active power, 0x1B20 import energy, 0x1B24 export energy


substitutions:
  devicename: "pv-dg-controller"
  friendly_name: "PV DG Controller"

  # Edit Modbus slave IDs here per site before compile.
  grid1_addr: "1"
  grid2_addr: "11"
  gen1_addr: "2"
  gen2_addr: "3"
  gen3_addr: "12"
  gen4_addr: "13"
  inv1_addr: "10"
  inv2_addr: "20"
  inv3_addr: "21"

esphome:
  name: ${devicename}
  friendly_name: ${friendly_name}
  project:
    name: "oai.pv_dg_controller"
    version: "2.0-dynamic"
  on_boot:
    priority: 200
    then:
      - delay: 6s
      - lambda: |-
          id(pv_cmd_percent_internal) = 0.0f;
          id(pv_cmd_kw_internal) = 0.0f;
          id(control_error_kw) = 0.0f;
          id(filtered_selected_grid_kw) = 0.0f;
          id(filtered_gen_total_kw) = 0.0f;
          id(inv1_cmd_kw_internal) = 0.0f;
          id(inv2_cmd_kw_internal) = 0.0f;
          id(inv3_cmd_kw_internal) = 0.0f;
      - text_sensor.template.publish:
          id: controller_state
          state: "DISABLED"

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:
  level: DEBUG
  initial_level: WARN
  baud_rate: 115200

api:
  reboot_timeout: 0s
  encryption:
    key: !secret api_key

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  reboot_timeout: 0s
  ap:
    ssid: "PV-DG Fallback"
    password: !secret fallback_ap_password

captive_portal:

web_server:
  port: 80
  version: 3
  sorting_groups:
    - id: grp_overview
      name: "Overview"
      sorting_weight: 10
    - id: grp_inventory
      name: "Source Inventory"
      sorting_weight: 20
    - id: grp_control
      name: "Control"
      sorting_weight: 30
    - id: grp_grid
      name: "Grid Meters"
      sorting_weight: 40
    - id: grp_gen
      name: "Generator Meters"
      sorting_weight: 50
    - id: grp_inv
      name: "Solar Inverters"
      sorting_weight: 60
    - id: grp_service
      name: "Huawei Service"
      sorting_weight: 70
    - id: grp_io
      name: "I/O"
      sorting_weight: 80
    - id: grp_diag
      name: "Diagnostics"
      sorting_weight: 90


time:
  - platform: sntp
    id: sntp_time

i2c:
  id: bus_a
  sda: GPIO4
  scl:
    number: GPIO15
    ignore_strapping_warning: true
  scan: true

pcf8574:
  - id: pcf_out
    address: 0x24
  - id: pcf_in
    address: 0x22

uart:
  - id: rs485
    tx_pin: GPIO27
    rx_pin: GPIO14
    baud_rate: 9600
    data_bits: 8
    parity: NONE
    stop_bits: 1

modbus:
  - id: plant_bus
    uart_id: rs485
    send_wait_time: 250ms

globals:
  - id: pv_cmd_percent_internal
    type: float
    restore_value: yes
    initial_value: '0.0'
  - id: pv_cmd_kw_internal
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: control_error_kw
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: filtered_selected_grid_kw
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: filtered_gen_total_kw
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: inv1_cmd_kw_internal
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: inv2_cmd_kw_internal
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: inv3_cmd_kw_internal
    type: float
    restore_value: no
    initial_value: '0.0'

modbus_controller:

- id: grid1_meter
  modbus_id: plant_bus
  address: ${grid1_addr}
  setup_priority: -10
  update_interval: 2s
  command_throttle: 200ms
  offline_skip_updates: 12
  max_cmd_retries: 1
  on_online:
    then:
      - binary_sensor.template.publish:
          id: grid1_online
          state: true
  on_offline:
    then:
      - binary_sensor.template.publish:
          id: grid1_online
          state: false

- id: grid2_meter
  modbus_id: plant_bus
  address: ${grid2_addr}
  setup_priority: -10
