  name: "Grid Meter 1 Online"
  internal: true

- platform: template
  id: grid2_online
  name: "Grid Meter 2 Online"
  internal: true

- platform: template
  id: gen1_online
  name: "Generator Meter 1 Online"
  internal: true

- platform: template
  id: gen2_online
  name: "Generator Meter 2 Online"
  internal: true

- platform: template
