- platform: template
  id: selected_grid_control_kw
  name: "Selected Grid Control Power"
  unit_of_measurement: "kW"
  accuracy_decimals: 2
  lambda: |-
    if (id(grid_phase_mode).state == "primary_avg" && id(grid1_enable).state && id(grid1_online).state) {
      if (isnan(id(grid1_l1_kw_raw).state) || isnan(id(grid1_l2_kw_raw).state) || isnan(id(grid1_l3_kw_raw).state)) return id(site_grid_net_kw).state;
      return (id(grid1_l1_kw_raw).state + id(grid1_l2_kw_raw).state + id(grid1_l3_kw_raw).state) / 3.0f;
    }
    if (id(grid_phase_mode).state == "primary_max" && id(grid1_enable).state && id(grid1_online).state) {
      float a = id(grid1_l1_kw_raw).state;
      float b = id(grid1_l2_kw_raw).state;
      float c = id(grid1_l3_kw_raw).state;
      float m = a;
      if (b > m) m = b;
      if (c > m) m = c;
      return m;
    }
    if (id(grid_phase_mode).state == "primary_min" && id(grid1_enable).state && id(grid1_online).state) {
      float a = id(grid1_l1_kw_raw).state;
      float b = id(grid1_l2_kw_raw).state;
      float c = id(grid1_l3_kw_raw).state;
      float m = a;
      if (b < m) m = b;
      if (c < m) m = c;
      return m;
    }
    return id(site_grid_net_kw).state;
  web_server:
    sorting_group_id: grp_overview
    sorting_weight: 8

