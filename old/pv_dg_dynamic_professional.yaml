select:
  - platform: template
    id: control_mode
    name: "Control Mode"
    optimistic: true
    restore_value: true
    options:
      - "disabled"
      - "grid_zero_export"
      - "grid_limited_export"
      - "grid_limited_import"
      - "generator_hold"
    web_server:
      sorting_group_id: grp_control
      sorting_weight: 10

  - platform: template
    id: grid_phase_mode
    name: "Grid Control Input"
    optimistic: true
    restore_value: true
    options:
      - "total"
      - "primary_avg"
      - "primary_max"
      - "primary_min"
    web_server:
      sorting_group_id: grp_control
      sorting_weight: 11
number:

- platform: template
  id: deadband_kw
  name: "Deadband kW"
  min_value: 0
  max_value: 50
  step: 0.1
  optimistic: true
  restore_value: true
  initial_value: 1.0
  web_server:
    sorting_group_id: grp_control
    sorting_weight: 20

- platform: template
