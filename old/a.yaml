esphome:
  name: em500-min-test
  friendly_name: em500-min-test

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:
  level: DEBUG
  baud_rate: 115200

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "EM500-Min Fallback"
    password: !secret fallback_ap_password

captive_portal:

web_server:
  port: 80

uart:
  id: rs485
  tx_pin: GPIO27
  rx_pin: GPIO14
  baud_rate: 9600
  data_bits: 8
  parity: NONE
  stop_bits: 1

modbus:
  id: em500_bus
  uart_id: rs485
  send_wait_time: 300ms

modbus_controller:
  - id: em500
    modbus_id: em500_bus
    address: 1
    setup_priority: -10
    update_interval: 5s
    command_throttle: 200ms

sensor:
  - platform: modbus_controller
    modbus_controller_id: em500
    id: em500_l1_voltage
    name: "EM500 L1 Voltage"
    register_type: read
    address: 0x0002
    value_type: U_DWORD
    unit_of_measurement: "V"
    accuracy_decimals: 2
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: em500
    id: em500_total_import_active_energy
    name: "EM500 Total Import Active Energy"
    register_type: holding
    address: 0x1B21
    value_type: U_QWORD
    force_new_range: true
    unit_of_measurement: "kWh"
    accuracy_decimals: 2
    state_class: total_increasing
    filters:
      - lambda: |-
          return x / 4294967296.0f;
      - multiply: 0.01

interval:
  - interval: 10s
    then:
      - logger.log:
          level: INFO
          format: "L1 Voltage=%.2f V | Energy=%.2f kWh"
          args:
            - "id(em500_l1_voltage).state"
            - "id(em500_total_import_active_energy).state"