select:
  - platform: template
    id: control_mode
    name: "Control Mode"
    optimistic: true
    restore_value: true
    options:
      - "disabled"
      - "grid_zero_export"
      - "grid_limited_export"
      - "grid_limited_import"
    initial_option: "disabled"
    web_server:
      sorting_group_id: grp_control
      sorting_weight: 2

number:
  - platform: template
    id: pv_rated_kw
    name: "PV Rated kW"
    min_value: 1
    max_value: 5000
    step: 1
    optimistic: true
    restore_value: true
    initial_value: 100
    web_server:
      sorting_group_id: grp_control
      sorting_weight: 10

  - platform: template
    id: deadband_kw
    name: "Deadband kW"
    min_value: 0
    max_value: 50
    step: 0.1
    optimistic: true
    restore_value: true
    initial_value: 1.0
    web_server:
      sorting_group_id: grp_control
      sorting_weight: 11

  - platform: template
    id: control_gain
    name: "Control Gain"
    min_value: 0.01
    max_value: 2.0
    step: 0.01
    optimistic: true
    restore_value: true
    initial_value: 0.20
    web_server:
      sorting_group_id: grp_control
      sorting_weight: 12

  - platform: template
    id: export_limit_kw
    name: "Export Limit kW"
    min_value: 0
    max_value: 5000
    step: 0.1
    optimistic: true
    restore_value: true
    initial_value: 0.0
    web_server:
      sorting_group_id: grp_control
      sorting_weight: 13

  - platform: template
    id: import_limit_kw
    name: "Import Limit kW"
    min_value: 0
    max_value: 5000
    step: 0.1
    optimistic: true
    restore_value: true
    initial_value: 0.0
    web_server:
      sorting_group_id: grp_control
      sorting_weight: 14

  - platform: template
    id: min_pv_percent
    name: "Min PV Percent"
    min_value: 0
    max_value: 100
    step: 1
    optimistic: true
    restore_value: true
    initial_value: 0
    web_server:
      sorting_group_id: grp_control
      sorting_weight: 15

  - platform: template
    id: max_pv_percent
    name: "Max PV Percent"
    min_value: 0
    max_value: 100
    step: 1
    optimistic: true
    restore_value: true
    initial_value: 100
    web_server:
      sorting_group_id: grp_control
      sorting_weight: 16

  - platform: template
    id: ramp_pct_step
    name: "Ramp pct Step"
    min_value: 0.1
    max_value: 20
    step: 0.1
    optimistic: true
    restore_value: true
    initial_value: 3.0
    web_server:
      sorting_group_id: grp_control
      sorting_weight: 17

  - platform: template
    id: inverter_command_kw
    name: "Inverter Command kW"
    min_value: 0
    max_value: 5000
    step: 0.1
    optimistic: true
    restore_value: false
    initial_value: 0
    web_server:
      sorting_group_id: grp_inverter
      sorting_weight: 20

text_sensor:
  - platform: template
    id: pvdg_controller_id
    name: "Controller ID"
    lambda: |-
      return {App.get_name()};
    update_interval: 60s
    web_server:
      sorting_group_id: grp_overview
      sorting_weight: 1

  - platform: template
    id: pvdg_fw_version
    name: "Firmware Version"
    lambda: |-
      return {ESPHOME_VERSION};
    update_interval: 60s
    web_server:
      sorting_group_id: grp_overview
      sorting_weight: 2

  - platform: template
    id: pvdg_mac
    name: "MAC Address"
    lambda: |-
      return { id(wifi_mac_sensor).has_state() ? id(wifi_mac_sensor).state.c_str() : "NA" };
    update_interval: 60s
    web_server:
      sorting_group_id: grp_overview
      sorting_weight: 3

  - platform: template
    id: controller_state
    name: "Controller State"
    lambda: |-
      if (!id(controller_enable).state) return {"DISABLED"};
      if (id(control_mode).state == "grid_zero_export") return {"GRID ZERO EXPORT"};
      if (id(control_mode).state == "grid_limited_export") return {"GRID LIMITED EXPORT"};
      if (id(control_mode).state == "grid_limited_import") return {"GRID LIMITED IMPORT"};
      return {"DISABLED"};
    update_interval: 2s
    web_server:
      sorting_group_id: grp_control
      sorting_weight: 4

  - platform: template
    id: grid_status
    name: "Grid Meter Status"
    lambda: |-
      static char s[80];
      if (!id(enable_grid_meter).state) return {"DISABLED"};
      if (id(grid_seen)) return {"ONLINE"};
      if (id(grid_mb_fault_valid)) {
        snprintf(s, sizeof(s), "NO COMM fc=%u reg=%u", (unsigned) id(grid_mb_fault_fc), (unsigned) id(grid_mb_fault_reg));
        return { s };
      }
      return {"NO DATA"};
    update_interval: 2s
    web_server:
      sorting_group_id: grp_grid
      sorting_weight: 1

  - platform: template
    id: inverter_status
    name: "Inverter Status"
    lambda: |-
      if (!id(enable_inverter).state) return {"DISABLED"};
      return { id(inverter_seen) ? "ONLINE" : "NO DATA" };
    update_interval: 2s
    web_server:
      sorting_group_id: grp_inverter
      sorting_weight: 1

  - platform: template
    id: gen1_status
    name: "Generator 1 Meter Status"
    lambda: |-
      if (!id(enable_gen1_meter).state) return {"DISABLED"};
      return { id(gen1_seen) ? "ONLINE" : "NO DATA" };
