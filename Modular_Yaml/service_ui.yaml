switch:
  - platform: template
    id: controller_enable
    name: "Controller Enable"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    web_server:
      sorting_group_id: grp_control
      sorting_weight: 1

  - platform: template
    id: enable_grid_meter
    name: "Enable Grid Meter"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    turn_on_action:
      - component.resume: grid_meter
    turn_off_action:
      - component.suspend: grid_meter
    web_server:
      sorting_group_id: grp_service
      sorting_weight: 1

  - platform: template
    id: enable_inverter
    name: "Enable Inverter"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
