button:
  - platform: restart
    name: "Restart Controller"
    web_server:
      sorting_group_id: grp_debug
      sorting_weight: 10

  - platform: template
    name: "Debug INFO"
    web_server:
      sorting_group_id: grp_debug
      sorting_weight: 11
    on_press:
      - logger.set_level: INFO

  - platform: template
    name: "Debug DEBUG"
    web_server:
      sorting_group_id: grp_debug
      sorting_weight: 12
    on_press:
      - logger.set_level: DEBUG

  - platform: template
    name: "Debug WARN"
    web_server:
      sorting_group_id: grp_debug
      sorting_weight: 13
    on_press:
      - logger.set_level: WARN