sensor:
  - platform: modbus_controller
    modbus_controller_id: gen2_meter
    id: gen2_total_active_power_w
    name: "Generator 2 Total Active Power"
    register_type: read
    address: 0x0040
    value_type: S_DWORD
    unit_of_measurement: "W"
    accuracy_decimals: 2
    filters:
      - multiply: 0.01
    on_value:
      - lambda: "id(gen2_seen) = true;"
    web_server:
      sorting_group_id: grp_grid
      sorting_weight: 210
