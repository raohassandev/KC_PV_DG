  - platform: gpio
    id: relay_6
    name: "Relay 6"
    pin:
      pcf8574: pcf_out
      number: 5
      mode: OUTPUT
      inverted: true
    web_server:
      sorting_group_id: grp_io
      sorting_weight: 15

binary_sensor:
  - platform: status
    name: "ESP Online"
    web_server:
      sorting_group_id: grp_debug
      sorting_weight: 1

  - platform: gpio
    name: "Input 1"
    pin:
      pcf8574: pcf_in
      number: 0
      mode: INPUT
      inverted: true
    web_server:
      sorting_group_id: grp_io
      sorting_weight: 20

  - platform: gpio
    name: "Input 2"
    pin:
      pcf8574: pcf_in
      number: 1
      mode: INPUT
      inverted: true
    web_server:
      sorting_group_id: grp_io
      sorting_weight: 21

  - platform: gpio
    name: "Input 3"
    pin:
      pcf8574: pcf_in
      number: 2
      mode: INPUT
      inverted: true
    web_server:
      sorting_group_id: grp_io
