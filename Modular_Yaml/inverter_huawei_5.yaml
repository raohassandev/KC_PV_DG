sensor:
  - platform: modbus_controller
    modbus_controller_id: solar_inverter_5
    id: inverter5_pmax_kw
    name: "Inverter 5 Pmax"
    register_type: read
    address: 30083
    value_type: U_DWORD
    unit_of_measurement: "kW"
    accuracy_decimals: 3
    filters:
      - multiply: 0.001
    on_value:
      - lambda: "id(inverter5_seen) = true;"
    web_server:
      sorting_group_id: grp_inverter
      sorting_weight: 140

  - platform: modbus_controller
    modbus_controller_id: solar_inverter_5
    id: inverter5_actual_kw
    name: "Inverter 5 Actual Power"
    register_type: read
    address: 32080
    value_type: S_DWORD
    unit_of_measurement: "kW"
    accuracy_decimals: 3
    filters:
      - multiply: 0.001
    on_value:
      - lambda: "id(inverter5_seen) = true;"
    web_server:
      sorting_group_id: grp_inverter
      sorting_weight: 141
