esphome:
  name: ${devicename}
  friendly_name: ${friendly_name}
  # Service enable switches do not run turn_on/off on restore. Explicitly resume/suspend each
  # modbus_controller at boot so RTU polling matches the switch (avoids a stuck-suspended grid meter).
  on_boot:
    # ESPHome runs HIGHER on_boot priority FIRST. The suspend-all pass MUST run before the switch pass,
    # otherwise absent slaves (e.g. unit 29/30) can be resumed and each ~1s Modbus timeout starves the
    # grid meter on the shared RS485 bus (all sensors NA).
    - priority: 810
      then:
        - component.suspend: solar_inverter
        - component.suspend: solar_inverter_2
        - component.suspend: solar_inverter_3
        - component.suspend: solar_inverter_4
        - component.suspend: solar_inverter_5
        - component.suspend: solar_inverter_6
        - component.suspend: solar_inverter_7
        - component.suspend: solar_inverter_8
        - component.suspend: solar_inverter_9
        - component.suspend: solar_inverter_10
        - component.suspend: gen1_meter
        - component.suspend: gen2_meter
    - priority: 750
      then:
        - if:
            condition:
              switch.is_on: enable_grid_meter
            then:
              - component.resume: grid_meter
            else:
              - component.suspend: grid_meter
        - if:
            condition:
              switch.is_on: enable_inverter
            then:
              - component.resume: solar_inverter
            else:
              - component.suspend: solar_inverter
        - if:
            condition:
              switch.is_on: enable_gen1_meter
            then:
              - component.resume: gen1_meter
            else:
              - component.suspend: gen1_meter
        - if:
            condition:
              switch.is_on: enable_gen2_meter
            then:
              - component.resume: gen2_meter
            else:
              - component.suspend: gen2_meter
        - if:
            condition:
              switch.is_on: enable_inverter_2
            then:
              - component.resume: solar_inverter_2
            else:
              - component.suspend: solar_inverter_2
        - if:
            condition:
              switch.is_on: enable_inverter_3
            then:
              - component.resume: solar_inverter_3
            else:
              - component.suspend: solar_inverter_3
        - if:
            condition:
              switch.is_on: enable_inverter_4
            then:
              - component.resume: solar_inverter_4
            else:
              - component.suspend: solar_inverter_4
        - if:
            condition:
              switch.is_on: enable_inverter_5
            then:
              - component.resume: solar_inverter_5
            else:
              - component.suspend: solar_inverter_5
        - if:
            condition:
              switch.is_on: enable_inverter_6
            then:
              - component.resume: solar_inverter_6
            else:
              - component.suspend: solar_inverter_6
        - if:
            condition:
              switch.is_on: enable_inverter_7
            then:
              - component.resume: solar_inverter_7
            else:
              - component.suspend: solar_inverter_7
        - if:
            condition:
              switch.is_on: enable_inverter_8
            then:
              - component.resume: solar_inverter_8
            else:
              - component.suspend: solar_inverter_8
        - if:
            condition:
              switch.is_on: enable_inverter_9
            then:
              - component.resume: solar_inverter_9
            else:
              - component.suspend: solar_inverter_9
        - if:
            condition:
              switch.is_on: enable_inverter_10
            then:
              - component.resume: solar_inverter_10
            else:
              - component.suspend: solar_inverter_10

substitutions:
  # Which Modbus RTU bus each built-in controller uses.
  #
  # Options:
  # - plant_bus        (default RS485 UART)
  # - plant_bus_rs232  (secondary RTU bus over RS232 UART)
  grid_meter_bus_id: plant_bus
  inverter_bus_id: plant_bus
  gen1_meter_bus_id: plant_bus
  gen2_meter_bus_id: plant_bus
  inverter2_bus_id: plant_bus
  inverter3_bus_id: plant_bus
  inverter4_bus_id: plant_bus
  inverter5_bus_id: plant_bus
  inverter6_bus_id: plant_bus
  inverter7_bus_id: plant_bus
  inverter8_bus_id: plant_bus
  inverter9_bus_id: plant_bus
  inverter10_bus_id: plant_bus

  # Default Modbus unit/slave addresses (override per site build)
  grid_meter_address: "1"
  gen1_meter_address: "11"
  gen2_meter_address: "12"
  inverter1_address: "21"
  inverter2_address: "22"
  inverter3_address: "23"
  inverter4_address: "24"
  inverter5_address: "25"
  inverter6_address: "26"
  inverter7_address: "27"
  inverter8_address: "28"
  inverter9_address: "29"
  inverter10_address: "30"

  # Default Modbus controller poll cadence (per-device; many devices share the same RS485 UART).
  modbus_device_poll_interval: 2s
  # Grid: fail fast. PV/gen: skip more update cycles while a slave is offline so absent units (e.g. 28, 30)
  # do not each burn ~1s timeouts and flood "duplicate command" coalesce warnings on the shared bus.
  # Grid meter: lower skip count so a brief bus glitch recovers faster (fewer all-NA update cycles).
  modbus_offline_skip_grid: "1"
  modbus_offline_skip_pv: "12"
  # modbus_controller blocks set max_cmd_retries: 0 on PV/gen (default 4) so absent slaves do not repeat the
  # same failed request several times per sensor cycle.

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:
  level: DEBUG
  initial_level: INFO
  baud_rate: 115200
  logs:
    # Coalescing an already-queued read logs at WARNING per frame; busy RS485 makes this very noisy.
    modbus_controller: ERROR

debug:
  update_interval: 5s

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "PV-DG Fallback"
    password: !secret fallback_ap_password

captive_portal:

web_server:
  port: 80
  version: 3
  # Group order: keep Energy with primary site totals (after Control, before per-phase Grid / PV detail).
  sorting_groups:
    - id: grp_overview
      name: "Overview"
      sorting_weight: 10
    - id: grp_control
      name: "Control"
      sorting_weight: 20
    - id: grp_energy
      name: "Energy"
      sorting_weight: 25
    - id: grp_grid
      name: "Grid Meter"
      sorting_weight: 30
    - id: grp_inverter
      name: "PV Inverter"
      sorting_weight: 40
    - id: grp_service
      name: "Service"
      sorting_weight: 60
    - id: grp_io
      name: "I/O"
      sorting_weight: 70
    - id: grp_debug
      name: "Debug"
      sorting_weight: 80

uart:
  - id: rs485
    tx_pin: GPIO27
    rx_pin: GPIO14
    baud_rate: 9600
    data_bits: 8
    parity: NONE
    stop_bits: 1

  # Optional second UART for Modbus RTU over RS232 (via a proper RS232 level shifter)
  # or via an RS232→RS485 converter when you need an additional RTU bus.
  #
  # IMPORTANT: RS232 is not 3.3V TTL UART. Use a MAX3232 (or equivalent) if connecting directly.
  # Pin defaults may need to be adjusted to your hardware revision.
  - id: rs232
    tx_pin: ${rs232_tx_pin}
    rx_pin: ${rs232_rx_pin}
    baud_rate: ${rs232_baud_rate}
    data_bits: 8
    parity: NONE
    stop_bits: 1

modbus:
  - id: plant_bus
    uart_id: rs485
    # Longer gap when many controllers share RS485 — avoids starvation / CRC errors vs a single grid meter.
    send_wait_time: 800ms
    # Extra quiet time after each response so slaves can process before the next frame (default 100ms).
    turnaround_time: 300ms

  # Secondary Modbus RTU bus (RS232).
  - id: plant_bus_rs232
    uart_id: rs232
    send_wait_time: 800ms
    turnaround_time: 300ms

globals:
  - id: pv_cmd_percent_internal
    type: float
    restore_value: yes
    initial_value: "0.0"
  - id: pv_cmd_kw_internal
    type: float
    restore_value: no
    initial_value: "0.0"
  - id: control_error_kw
    type: float
    restore_value: no
    initial_value: "0.0"
  - id: filtered_grid_kw
    type: float
    restore_value: no
    initial_value: "0.0"
  - id: grid_seen
    type: bool
    restore_value: no
    initial_value: "false"
  # Last Modbus client fault for grid_meter (set in on_offline; cleared on_online).
  - id: grid_mb_fault_fc
    type: uint8_t
    restore_value: no
    initial_value: "0"
  - id: grid_mb_fault_reg
    type: uint16_t
    restore_value: no
    initial_value: "0"
  - id: grid_mb_fault_valid
    type: bool
    restore_value: no
    initial_value: "false"
  - id: inverter_seen
    type: bool
    restore_value: no
    initial_value: "false"
  - id: gen1_seen
    type: bool
    restore_value: no
    initial_value: "false"
  - id: gen2_seen
    type: bool
    restore_value: no
    initial_value: "false"
  - id: inverter2_seen
    type: bool
    restore_value: no
    initial_value: "false"
  - id: inverter3_seen
    type: bool
    restore_value: no
    initial_value: "false"
  - id: inverter4_seen
    type: bool
    restore_value: no
    initial_value: "false"
  - id: inverter5_seen
    type: bool
    restore_value: no
    initial_value: "false"
  - id: inverter6_seen
    type: bool
    restore_value: no
    initial_value: "false"
  - id: inverter7_seen
    type: bool
    restore_value: no
    initial_value: "false"
  - id: inverter8_seen
    type: bool
    restore_value: no
    initial_value: "false"
  - id: inverter9_seen
    type: bool
    restore_value: no
    initial_value: "false"
  - id: inverter10_seen
    type: bool
    restore_value: no
    initial_value: "false"

modbus_controller:
  - id: grid_meter
    modbus_id: ${grid_meter_bus_id}
    address: ${grid_meter_address}
    setup_priority: -10
    update_interval: ${modbus_device_poll_interval}
    # Slightly longer than PV/inverter slaves — many DWORD reads per cycle on EM500.
    command_throttle: 220ms
    # Default max_cmd_retries is 4 — absent slaves would multiply timeouts and starve the bus.
    max_cmd_retries: 1
    offline_skip_updates: ${modbus_offline_skip_grid}
    on_online:
      then:
        - lambda: |-
            id(grid_mb_fault_valid) = false;
    on_offline:
      then:
        - lambda: |-
            id(grid_mb_fault_fc) = function_code;
            id(grid_mb_fault_reg) = address;
            id(grid_mb_fault_valid) = true;

  - id: solar_inverter
    modbus_id: ${inverter_bus_id}
    address: ${inverter1_address}
    setup_priority: -10
    update_interval: ${modbus_device_poll_interval}
    command_throttle: 350ms
    max_cmd_retries: 0
    offline_skip_updates: ${modbus_offline_skip_pv}

  - id: gen1_meter
    modbus_id: ${gen1_meter_bus_id}
    address: ${gen1_meter_address}
    setup_priority: -10
    update_interval: ${modbus_device_poll_interval}
    command_throttle: 150ms
    max_cmd_retries: 0
    offline_skip_updates: ${modbus_offline_skip_pv}

  - id: gen2_meter
    modbus_id: ${gen2_meter_bus_id}
    address: ${gen2_meter_address}
    setup_priority: -10
    update_interval: ${modbus_device_poll_interval}
    command_throttle: 150ms
    max_cmd_retries: 0
    offline_skip_updates: ${modbus_offline_skip_pv}

  - id: solar_inverter_2
    modbus_id: ${inverter2_bus_id}
    address: ${inverter2_address}
    setup_priority: -10
    update_interval: ${modbus_device_poll_interval}
    command_throttle: 350ms
    max_cmd_retries: 0
    offline_skip_updates: ${modbus_offline_skip_pv}

  - id: solar_inverter_3
    modbus_id: ${inverter3_bus_id}
    address: ${inverter3_address}
    setup_priority: -10
    update_interval: ${modbus_device_poll_interval}
    command_throttle: 350ms
    max_cmd_retries: 0
    offline_skip_updates: ${modbus_offline_skip_pv}

  - id: solar_inverter_4
    modbus_id: ${inverter4_bus_id}
    address: ${inverter4_address}
    setup_priority: -10
    update_interval: ${modbus_device_poll_interval}
    command_throttle: 350ms
    max_cmd_retries: 0
    offline_skip_updates: ${modbus_offline_skip_pv}

  - id: solar_inverter_5
    modbus_id: ${inverter5_bus_id}
    address: ${inverter5_address}
    setup_priority: -10
    update_interval: ${modbus_device_poll_interval}
    command_throttle: 350ms
    max_cmd_retries: 0
    offline_skip_updates: ${modbus_offline_skip_pv}

  - id: solar_inverter_6
    modbus_id: ${inverter6_bus_id}
    address: ${inverter6_address}
    setup_priority: -10
    update_interval: ${modbus_device_poll_interval}
    command_throttle: 350ms
    max_cmd_retries: 0
    offline_skip_updates: ${modbus_offline_skip_pv}

  - id: solar_inverter_7
    modbus_id: ${inverter7_bus_id}
    address: ${inverter7_address}
    setup_priority: -10
    update_interval: ${modbus_device_poll_interval}
    command_throttle: 350ms
    max_cmd_retries: 0
    offline_skip_updates: ${modbus_offline_skip_pv}

  - id: solar_inverter_8
    modbus_id: ${inverter8_bus_id}
    address: ${inverter8_address}
    setup_priority: -10
    update_interval: ${modbus_device_poll_interval}
    command_throttle: 350ms
    max_cmd_retries: 0
    offline_skip_updates: ${modbus_offline_skip_pv}

  - id: solar_inverter_9
    modbus_id: ${inverter9_bus_id}
    address: ${inverter9_address}
    setup_priority: -10
    update_interval: ${modbus_device_poll_interval}
    command_throttle: 350ms
    max_cmd_retries: 0
    # High skip: absent slaves at 29/30 must not queue frequent ~1s timeouts on the shared grid RS485 bus.
    offline_skip_updates: 150

  - id: solar_inverter_10
    modbus_id: ${inverter10_bus_id}
    address: ${inverter10_address}
    setup_priority: -10
    update_interval: ${modbus_device_poll_interval}
    command_throttle: 350ms
    max_cmd_retries: 0
    offline_skip_updates: 150
    
text_sensor:
  - platform: wifi_info
    ip_address:
      id: ip_addr
      name: "IP Address"
    ssid:
      id: wifi_ssid_sensor
      name: "WiFi SSID"
    bssid:
      id: wifi_bssid_sensor
      name: "WiFi BSSID"
    mac_address:
      id: wifi_mac_sensor
      name: "WiFi MAC"

  - platform: debug
    device:
      name: "Board Device Info"
      entity_category: diagnostic
    reset_reason:
      name: "Board Reset Reason"
      entity_category: diagnostic

sensor:
  - platform: uptime
    id: board_uptime_s
    name: "Board Uptime"
    unit_of_measurement: "s"
    accuracy_decimals: 0
    entity_category: diagnostic
    web_server:
      sorting_group_id: grp_service
      sorting_weight: 10

  - platform: wifi_signal
    id: board_wifi_rssi
    name: "Board WiFi Signal"
    unit_of_measurement: "dBm"
    accuracy_decimals: 0
    entity_category: diagnostic
    update_interval: 10s
    web_server:
      sorting_group_id: grp_service
      sorting_weight: 11

  - platform: internal_temperature
    id: board_internal_temp_c
    name: "Board Internal Temperature"
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    entity_category: diagnostic
    web_server:
      sorting_group_id: grp_service
      sorting_weight: 12

  - platform: debug
    free:
      name: "Board Heap Free"
      entity_category: diagnostic
    block:
      name: "Board Heap Max Block"
      entity_category: diagnostic
    min_free:
      name: "Board Heap Min Free"
      entity_category: diagnostic
    fragmentation:
      name: "Board Heap Fragmentation"
      entity_category: diagnostic
    loop_time:
      name: "Board Loop Time"
      entity_category: diagnostic
    cpu_frequency:
      name: "Board CPU Frequency"
      entity_category: diagnostic