    id: grid_import_kwh
    name: "Grid Import Energy"
    register_type: holding
    # Table 3 total import (4 words, kWh/100): verified Modbus start on hardware (see file header).
    address: 0x1B21
    value_type: U_QWORD
    force_new_range: true
    unit_of_measurement: "kWh"
    accuracy_decimals: 2
    state_class: total_increasing
    filters:
      - lambda: |-
          return x / 4294967296.0f;
      - multiply: 0.01
    on_value:
      - lambda: "id(grid_seen) = true; id(grid_mb_fault_valid) = false;"
    web_server:
      sorting_group_id: grp_energy
      sorting_weight: 10

  - platform: modbus_controller
    modbus_controller_id: grid_meter
    id: grid_export_kwh
    name: "Grid Export Energy"
    register_type: holding
    # Table 3 total export (4 words): verified Modbus start on hardware.
    address: 0x1B25
    value_type: U_QWORD
    force_new_range: true
    unit_of_measurement: "kWh"
    accuracy_decimals: 2
