      sorting_weight: 11

  - platform: modbus_controller
    modbus_controller_id: grid_meter
    id: grid_import_kwh_t1
    name: "Grid Import Energy Tariff 1"
    register_type: holding
    # Table 3 import tariff 1 (4 words): verified Modbus start on hardware.
    address: 0x1B49
    value_type: U_QWORD
    force_new_range: true
    unit_of_measurement: "kWh"
    accuracy_decimals: 2
    state_class: total_increasing
