# EM500 grid (Modular_Yaml/meter_em500_grid.yaml)
# - Table 1: register_type read (FC04) per EM500 / old/em500_full_test1.yaml.
# - Table 3 energy: holding (FC03), QWORD bases import 0x1B21, … (hardware-verified; see prior notes vs PDF 1B20H).
sensor:
  - platform: modbus_controller
    modbus_controller_id: grid_meter
    id: grid_l1_voltage
    name: "Grid L1 Voltage"
    register_type: read
    address: 0x0002
    value_type: U_DWORD
    unit_of_measurement: "V"
    accuracy_decimals: 2
    filters:
      - multiply: 0.01
    on_value:
      - lambda: "id(grid_seen) = true; id(grid_mb_fault_valid) = false;"
    web_server:
      sorting_group_id: grp_grid
      sorting_weight: 10

  - platform: modbus_controller
    modbus_controller_id: grid_meter
