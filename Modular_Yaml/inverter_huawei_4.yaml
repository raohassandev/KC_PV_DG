sensor:
  - platform: modbus_controller
    modbus_controller_id: solar_inverter_4
    id: inverter4_pmax_kw
    name: "Inverter 4 Pmax"
    register_type: read
    address: 30083
    value_type: U_DWORD
    unit_of_measurement: "kW"
    accuracy_decimals: 3
    filters:
      - multiply: 0.001
    on_value:
      - lambda: "id(inverter4_seen) = true;"
    web_server:
      sorting_group_id: grp_inverter
      sorting_weight: 130

  - platform: modbus_controller
    modbus_controller_id: solar_inverter_4
    id: inverter4_actual_kw
    name: "Inverter 4 Actual Power"
    register_type: read
    address: 32080
    value_type: S_DWORD
    unit_of_measurement: "kW"
    accuracy_decimals: 3
    filters:
      - multiply: 0.001
    on_value:
      - lambda: "id(inverter4_seen) = true;"
    web_server:
      sorting_group_id: grp_inverter
      sorting_weight: 131
